<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | Kwacha Ballon Arena</title>
    <style>
        /* Premium, Mobile-First Glassmorphism Design */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1e1e24 0%, #0b0c10 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
        }

        .auth-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px 30px;
            width: 90%;
            max-width: 380px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .auth-container h2 {
            margin-top: 0;
            font-weight: 600;
            font-size: 24px;
            letter-spacing: 0.5px;
        }

        .auth-container p {
            font-size: 14px;
            color: #a0a0a5;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            color: #d1d1d6;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #ffffff;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: border 0.3s ease;
        }

        .input-group input:focus {
            border: 1px solid #007aff;
        }

        .primary-btn {
            width: 100%;
            padding: 16px;
            background-color: #007aff;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 10px;
        }

        .primary-btn:hover {
            background-color: #0062cc;
        }

        .primary-btn:disabled {
            background-color: #3a3a40;
            cursor: not-allowed;
        }

        .toggle-text {
            margin-top: 24px;
            font-size: 14px;
            color: #a0a0a5;
        }

        .toggle-text span {
            color: #007aff;
            cursor: pointer;
            font-weight: 600;
        }

        .status-msg {
            min-height: 18px;
            font-size: 13px;
            margin-top: 14px;
            color: #ff6b6b;
        }
    </style>
</head>
<body>

    <div class="auth-container" id="login-box">
        <h2>Welcome Back</h2>
        <p>Sign in to access the flight deck.</p>

        <div class="input-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="pilot@example.com">
        </div>

        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button class="primary-btn" id="auth-btn" onclick="processAuth()">Sign In</button>

        <div class="status-msg" id="status-msg"></div>

        <div class="toggle-text">
            New here? <span onclick="toggleMode()">Create an account</span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // 1. Initialize Supabase safely
        // NOTE: the CDN script attaches its library to the global `supabase` object
        // (with a lowercase s) and exposes `supabase.createClient`. We must NOT name
        // our own client variable "supabase" too, or we shadow that global and get
        // "Cannot access 'supabase' before initialization" the instant this script runs —
        // which silently breaks every function below it (including toggleMode and
        // processAuth), making the buttons look unresponsive.
        const supabaseUrl = 'https://uccdevvfexfpxnnwtpxa.supabase.co';
        const supabaseKey = 'sb_publishable_cy9uVdq593I0sq2Q0x53Wg_k3Liixp_';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        // 2. State management
        let isLoginMode = true;

        window.toggleMode = function() {
            const title = document.querySelector('h2');
            const subtitle = document.querySelector('p');
            const btn = document.getElementById('auth-btn');
            const toggleText = document.querySelector('.toggle-text');
            const statusMsg = document.getElementById('status-msg');

            isLoginMode = !isLoginMode;
            statusMsg.innerText = '';

            if (isLoginMode) {
                title.innerText = "Welcome Back";
                subtitle.innerText = "Sign in to access the flight deck.";
                btn.innerText = "Sign In";
                toggleText.innerHTML = 'New here? <span onclick="toggleMode()">Create an account</span>';
            } else {
                title.innerText = "Create Account";
                subtitle.innerText = "Set up your profile to start playing.";
                btn.innerText = "Register";
                toggleText.innerHTML = 'Already have an account? <span onclick="toggleMode()">Sign in</span>';
            }
        };

        window.processAuth = async function() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('auth-btn');
            const statusMsg = document.getElementById('status-msg');

            statusMsg.style.color = '#ff6b6b';
            statusMsg.innerText = '';

            if (!email || !password) {
                statusMsg.innerText = "Please enter both an email and a password.";
                return;
            }

            btn.disabled = true;
            const originalLabel = btn.innerText;
            btn.innerText = "Please wait...";

            try {
                if (isLoginMode) {
                    const { data, error } = await supabaseClient.auth.signInWithPassword({
                        email: email,
                        password: password,
                    });
                    if (error) {
                        statusMsg.innerText = "Login failed: " + error.message;
                    } else {
                        statusMsg.style.color = '#4cd964';
                        statusMsg.innerText = "Success! Welcome back to the Arena.";
                    }
                } else {
                    const { data, error } = await supabaseClient.auth.signUp({
                        email: email,
                        password: password,
                    });
                    if (error) {
                        statusMsg.innerText = "Registration failed: " + error.message;
                    } else {
                        statusMsg.style.color = '#4cd964';
                        statusMsg.innerText = "Account created! Check your email for the verification link.";
                    }
                }
            } catch (err) {
                statusMsg.innerText = "Unexpected error: " + err.message;
            } finally {
                btn.disabled = false;
                btn.innerText = originalLabel;
            }
        };
    </script>
</body>
</html>
