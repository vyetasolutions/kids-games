<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vyeta Balloon Adventures</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            overflow-y: auto; /* Fixed mobile scrolling */
            padding: 40px 20px;
            box-sizing: border-box;
        }
        .container {
            display: flex;
            flex-direction: row;
            gap: 24px;
            max-width: 1000px;
            width: 100%;
        }
        
        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            body {
                padding: 20px 15px;
            }
        }

        .main-stage {
            flex: 2;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 28px;
            display: flex;
            flex-direction: column;
            min-height: 540px;
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }
        .header-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            z-index: 10;
        }
        .status-pill {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 800;
            color: #94a3b8;
            background: rgba(0,0,0,0.3);
            padding: 8px 16px;
            border-radius: 100px;
        }
        .balance-pill {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #34d399;
            padding: 10px 24px;
            border-radius: 100px;
            font-weight: 700;
            font-size: 1.15rem;
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .canvas-container {
            position: relative;
            flex: 1;
            width: 100%;
            margin: 16px 0;
            border-radius: 24px;
            overflow: hidden;
            background: linear-gradient(to bottom, #1e3a8a, #0f172a); /* Sky background */
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .live-multiplier-overlay {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 4.5rem;
            font-weight: 900;
            letter-spacing: -2px;
            pointer-events: none;
            z-index: 5;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 4px 20px rgba(0,0,0,0.5);
            transition: transform 0.1s ease;
        }
        .controls {
            width: 100%;
            display: flex;
            gap: 16px;
            z-index: 10;
        }
        input {
            width: 110px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 18px;
            color: white;
            font-size: 1.25rem;
            font-weight: 700;
            text-align: center;
            outline: none;
        }
        button {
            flex: 1;
            border: none;
            border-radius: 20px;
            font-size: 1.15rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn-bet { background: #3b82f6; color: #fff; box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3); }
        .btn-bet:hover { transform: translateY(-2px); background: #60a5fa; }
        .btn-cash { background: #10b981; color: #fff; box-shadow: 0 4px 25px rgba(16, 185, 129, 0.3); }
        .btn-cash:hover { transform: scale(1.02); background: #34d399; }
        .btn-disabled { background: #1e293b; color: #64748b; cursor: not-allowed; border: 1px solid #334155;}

        .side-panel {
            flex: 1;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 32px;
            padding: 24px;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }
        .ledger-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #cbd5e1;
            margin-bottom: 16px;
            font-weight: 700;
        }
        .ledger-content {
            font-size: 0.9rem;
            color: #94a3b8;
            overflow-y: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .toast-win {
            color: #059669;
            font-weight: 600;
            background: #d1fae5;
            padding: 10px 14px;
            border-radius: 12px;
            border-left: 4px solid #10b981;
        }
        .toast-normal {
            background: rgba(255,255,255,0.05);
            padding: 10px 14px;
            border-radius: 12px;
        }
        .vyeta-footer {
            margin-top: 30px;
            padding-bottom: 20px;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.3);
            font-weight: 600;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="main-stage">
            <div class="header-panel">
                <div id="status-text" class="status-pill">Warming up...</div>
                <div class="balance-pill" id="balance-pill">Wallet: $<span id="balance-display">1000.00</span></div>
            </div>

            <div class="canvas-container">
                <div id="multiplier-display" class="live-multiplier-overlay" style="color: #cbd5e1;">1.00x</div>
                <canvas id="gameCanvas"></canvas>
            </div>

            <div class="controls">
                <input type="number" id="bet-input" value="10" min="1">
                <button id="action-btn" class="btn-disabled">PLEASE WAIT...</button>
            </div>
        </div>

        <div class="side-panel">
            <div class="ledger-title">Live Flight Activity</div>
            <div id="ledger-content" class="ledger-content"></div>
        </div>
    </div>

    <!-- Premium Corporate Sticker -->
    <div class="vyeta-footer">Powered by Vyeta Digital Solutions</div>

    <script>
        // CORE SERVICE CONNECTION - UPDATE THIS URL!
        const SERVER_URL = "https://kids-games-o79b.onrender.com"; 
        const socket = io(SERVER_URL);

        let currentBalance = 1000.00;
        let hasBetInRound = false;
        let isInFlight = false;
        let globalMultiplier = 1.00;
        let gameState = 'waiting'; 
        let countdownTimer = null;

        // Physics & Effects
        let floatOffset = 0;
        let particles = [];
        let burstShards = [];
        let clouds = [];
        let shockwaveRadius = 0;
        let triggerShockwave = false;

        const statusText = document.getElementById('status-text');
        const balanceDisplay = document.getElementById('balance-display');
        const balancePill = document.getElementById('balance-pill');
        const multiplierDisplay = document.getElementById('multiplier-display');
        const actionBtn = document.getElementById('action-btn');
        const betInput = document.getElementById('bet-input');
        const ledgerContent = document.getElementById('ledger-content');

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            // Add a slight delay to ensure flexbox has calculated dimensions
            setTimeout(() => {
                canvas.width = canvas.parentElement.clientWidth;
                canvas.height = canvas.parentElement.clientHeight;
                initClouds();
            }, 50);
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function addLog(msg, isWin = false) {
            const div = document.createElement('div');
            div.className = isWin ? "toast-win" : "toast-normal";
            div.innerText = msg;
            ledgerContent.prepend(div);
            // Keep log short to prevent infinite scrolling
            if(ledgerContent.children.length > 15) {
                ledgerContent.removeChild(ledgerContent.lastChild);
            }
        }

        // --- CLOUD SYSTEM ---
        function initClouds() {
            clouds = [];
            for(let i = 0; i < 8; i++) {
                clouds.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: 30 + Math.random() * 50,
                    speed: 0.5 + Math.random() * 1.5,
                    opacity: 0.1 + Math.random() * 0.2
                });
            }
        }

        function drawCloud(x, y, size, opacity) {
            ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
            ctx.beginPath();
            ctx.arc(x, y, size, 0, Math.PI * 2);
            ctx.arc(x + size * 0.8, y - size * 0.3, size * 0.8, 0, Math.PI * 2);
            ctx.arc(x + size * 1.6, y, size * 0.9, 0, Math.PI * 2);
            ctx.fill();
        }

        // --- ARTISTIC GRAPHICS PIPELINE ---
        function drawScene() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            let centerX = canvas.width / 2;
            let centerY = canvas.height / 2 + 20;
            
            // Render and Move Clouds
            clouds.forEach(c => {
                drawCloud(c.x, c.y, c.size, c.opacity);
                if(gameState === 'flying') {
                    // Clouds move down faster as multiplier goes up
                    c.y += c.speed * (1 + (globalMultiplier * 0.5));
                } else if (gameState === 'waiting') {
                    // Gentle drift while boarding
                    c.y += c.speed * 0.2;
                }
                
                // Wrap clouds back to the top
                if(c.y > canvas.height + 100) {
                    c.y = -100;
                    c.x = Math.random() * canvas.width;
                }
            });
            
            // Generate fluid floating drift
            floatOffset += 0.04;
            if (gameState === 'flying' || gameState === 'waiting') {
                centerY += Math.sin(floatOffset) * 8; 
            }
            
            let balloonSize = 45 + Math.min(globalMultiplier * 10, 100);
            
            // Text scaling effect
            if (gameState === 'flying') {
                let textScale = 1 + Math.min((globalMultiplier - 1) * 0.02, 0.2);
                multiplierDisplay.style.transform = `translateX(-50%) scale(${textScale})`;
            } else {
                multiplierDisplay.style.transform = `translateX(-50%) scale(1)`;
            }

            // High-tension shaking mechanics
            if (globalMultiplier > 3.5 && gameState === 'flying') {
                centerX += (Math.random() - 0.5) * (globalMultiplier * 0.7);
                centerY += (Math.random() - 0.5) * (globalMultiplier * 0.7);
            }

            // RENDER BALLOON
            if (gameState !== 'crashed') {
                let colorGlow = ctx.createLinearGradient(centerX - balloonSize, centerY - balloonSize, centerX + balloonSize, centerY + balloonSize);
                if (globalMultiplier < 2) {
                    colorGlow.addColorStop(0, '#60a5fa'); colorGlow.addColorStop(1, '#2563eb');
                } else if (globalMultiplier < 5) {
                    colorGlow.addColorStop(0, '#fbbf24'); colorGlow.addColorStop(1, '#d97706');
                } else {
                    colorGlow.addColorStop(0, '#f87171'); colorGlow.addColorStop(1, '#dc2626');
                }

                // Ropes
                ctx.beginPath();
                ctx.strokeStyle = 'rgba(255,255,255,0.4)';
                ctx.lineWidth = 1.5;
                ctx.moveTo(centerX - balloonSize * 0.25, centerY + balloonSize * 0.4);
                ctx.lineTo(centerX - 14, centerY + balloonSize + 18);
                ctx.moveTo(centerX + balloonSize * 0.25, centerY + balloonSize * 0.4);
                ctx.lineTo(centerX + 14, centerY + balloonSize + 18);
                ctx.stroke();

                // Basket
                ctx.fillStyle = '#451a03';
                ctx.beginPath();
                ctx.roundRect(centerX - 16, centerY + balloonSize + 18, 32, 22, 5);
                ctx.fill();

                // Balloon envelope
                ctx.beginPath();
                ctx.fillStyle = colorGlow;
                ctx.arc(centerX, centerY, balloonSize, 0, Math.PI * 2);
                ctx.fill();
                
                // Outer structural glass-glare
                ctx.beginPath();
                ctx.fillStyle = 'rgba(255,255,255,0.15)';
                ctx.arc(centerX - balloonSize * 0.25, centerY - balloonSize * 0.25, balloonSize * 0.5, 0, Math.PI * 2);
                ctx.fill();
            }

            // WINNER SHOCKWAVE EFFECT
            if (triggerShockwave) {
                shockwaveRadius += 15;
                ctx.beginPath();
                ctx.strokeStyle = `rgba(52, 211, 153, ${Math.max(1 - (shockwaveRadius / 300), 0)})`;
                ctx.lineWidth = 6;
                ctx.arc(centerX, centerY, shockwaveRadius, 0, Math.PI * 2);
                ctx.stroke();
                if (shockwaveRadius > 300) triggerShockwave = false;
            }

            // WIN PARTICLES (MAGNETIC PULL TO WALLET)
            let targetX = canvas.width - 40;
            let targetY = -20; 
            
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += (targetX - p.x) * 0.1;
                p.y += (targetY - p.y) * 0.1;
                p.alpha -= 0.005;

                ctx.save();
                ctx.globalAlpha = Math.max(p.alpha, 0);
                ctx.fillStyle = '#34d399';
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();

                if (Math.abs(p.x - targetX) < 30 && Math.abs(p.y - targetY) < 30) {
                    particles.splice(i, 1);
                    balancePill.style.transform = "scale(1.08)";
                    setTimeout(() => balancePill.style.transform = "scale(1)", 150);
                }
            }

            // CATASTROPHIC BURST PARTICLES
            for (let i = burstShards.length - 1; i >= 0; i--) {
                let s = burstShards[i];
                s.x += s.vx;
                s.y += s.vy;
                s.vy += 0.2; // Gravity
                s.alpha -= 0.02;

                ctx.save();
                ctx.globalAlpha = Math.max(s.alpha, 0);
                ctx.fillStyle = s.color;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();

                if (s.alpha <= 0) burstShards.splice(i, 1);
            }

            requestAnimationFrame(drawScene);
        }
        requestAnimationFrame(drawScene);

        function triggerWinAnimation() {
            shockwaveRadius = 0;
            triggerShockwave = true;
            let startX = canvas.width / 2;
            let startY = canvas.height / 2 + 20 + Math.sin(floatOffset) * 8;
            
            for(let i=0; i<30; i++){
                particles.push({
                    x: startX + (Math.random() - 0.5) * 40,
                    y: startY + (Math.random() - 0.5) * 40,
                    size: Math.random() * 6 + 4,
                    alpha: 1.5
                });
            }
        }

        function triggerBurstAnimation() {
            let startX = canvas.width / 2;
            let startY = canvas.height / 2 + 20 + Math.sin(floatOffset) * 8;
            let fragmentColor = globalMultiplier < 2 ? '#3b82f6' : globalMultiplier < 5 ? '#f59e0b' : '#ef4444';

            for (let i = 0; i < 50; i++) {
                let angle = Math.random() * Math.PI * 2;
                let speed = Math.random() * 10 + 2;
                burstShards.push({
                    x: startX,
                    y: startY,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    size: Math.random() * 8 + 3,
                    color: fragmentColor,
                    alpha: 1.0
                });
            }
        }

        // --- GAME LOGIC & NETWORKING ---

        socket.on('betting_phase_started', () => {
            gameState = 'waiting';
            isInFlight = false;
            hasBetInRound = false;
            globalMultiplier = 1.00;
            
            multiplierDisplay.style.color = "#cbd5e1";
            multiplierDisplay.innerText = "1.00x";
            
            actionBtn.className = "btn-bet";
            actionBtn.innerText = "JOIN NEXT FLIGHT";
            betInput.disabled = false;

            // Start Live Countdown
            let timeLeft = 6;
            statusText.innerText = `Boarding... Doors close in ${timeLeft}s`;
            statusText.style.color = "#fbbf24";
            
            if(countdownTimer) clearInterval(countdownTimer);
            countdownTimer = setInterval(() => {
                timeLeft--;
                if(timeLeft > 0) {
                    statusText.innerText = `Boarding... Doors close in ${timeLeft}s`;
                } else {
                    clearInterval(countdownTimer);
                    statusText.innerText = "Ignition...";
                }
            }, 1000);
        });

        socket.on('game_started', () => {
            if(countdownTimer) clearInterval(countdownTimer);
            
            gameState = 'flying';
            isInFlight = true;
            statusText.innerText = "We are airborne!";
            statusText.style.color = "#34d399";
            multiplierDisplay.style.color = "#34d399";

            if (hasBetInRound) {
                actionBtn.className = "btn-cash";
                actionBtn.innerText = "COLLECT WINNINGS";
            } else {
                actionBtn.className = "btn-disabled";
                actionBtn.innerText = "FLIGHT IN PROGRESS";
            }
        });

        socket.on('multiplier_tick', (data) => {
            globalMultiplier = data.multiplier;
            multiplierDisplay.innerText = data.multiplier.toFixed(2) + "x";
            
            if(globalMultiplier >= 2 && globalMultiplier < 5) {
                multiplierDisplay.style.color = "#fbbf24";
            } else if (globalMultiplier >= 5) {
                multiplierDisplay.style.color = "#f87171";
            }

            if (hasBetInRound) {
                const liveWinnings = (parseFloat(betInput.value) * data.multiplier).toFixed(2);
                actionBtn.innerText = `COLLECT $${liveWinnings}`;
            }
        });

        socket.on('game_crashed', (data) => {
            if(countdownTimer) clearInterval(countdownTimer);
            gameState = 'crashed';
            isInFlight = false;
            globalMultiplier = data.crashedAt;
            
            triggerBurstAnimation();
            
            statusText.innerText = "Oh no, it popped!";
            statusText.style.color = "#ef4444";
            multiplierDisplay.style.color = "#ef4444";
            multiplierDisplay.innerText = data.crashedAt.toFixed(2) + "x";
            
            actionBtn.className = "btn-disabled";
            actionBtn.innerText = "FLIGHT ENDED";
            betInput.disabled = false;
        });

        socket.on('bet_confirmed', (data) => {
            hasBetInRound = true;
            currentBalance = data.balance;
            balanceDisplay.innerText = currentBalance.toFixed(2);
            actionBtn.className = "btn-disabled";
            actionBtn.innerText = "TICKET CONFIRMED!";
            betInput.disabled = true;
        });

        socket.on('cash_out_success', (data) => {
            hasBetInRound = false;
            currentBalance = data.balance;
            balanceDisplay.innerText = currentBalance.toFixed(2);
            actionBtn.className = "btn-disabled";
            actionBtn.innerText = "SAFE LANDING!";
            
            triggerWinAnimation();
            addLog(`Awesome! You safely collected $${data.winnings}`, true);
        });

        socket.on('ledger_update', (data) => {
            let userMsg = data.message.replace("Player placed a bet of", "A player bought a ticket for");
            userMsg = userMsg.replace("Player cashed out", "A player jumped to safety");
            addLog(userMsg);
        });

        socket.on('error_message', (data) => { alert(data.message); });

        actionBtn.addEventListener('click', () => {
            if (!isInFlight && !hasBetInRound && actionBtn.className !== "btn-disabled") {
                socket.emit('place_bet', { amount: betInput.value });
            } else if (isInFlight && hasBetInRound) {
                socket.emit('cash_out');
            }
        });
    </script>
</body>
</html>
