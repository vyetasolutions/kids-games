<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vyeta Kids Challenge</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#74ebd5,#ACB6E5);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* APP FRAME (FIXED CENTERING) */
.app{
    width:100%;
    max-width:420px;
    height:95vh;
    background:transparent;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

/* SCREENS */
.screen{
    display:none;
    height:100%;
}

.active{ display:block; }

/* CARD UI */
.card{
    background:white;
    border-radius:24px;
    padding:18px;
    margin:10px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
    text-align:center;
}

/* TOP HUD */
.hud{
    background:white;
    margin:10px;
    padding:10px;
    border-radius:20px;
    display:flex;
    justify-content:space-between;
    font-weight:bold;
}

/* PLAYER BUTTONS */
.player{
    padding:12px;
    margin:6px;
    border-radius:14px;
    border:none;
    background:#eee;
}

.player.selected{
    background:#2ecc71;
    color:white;
}

/* OPTIONS */
.option{
    display:block;
    padding:12px;
    margin:8px;
    border-radius:14px;
    background:#f3f3f3;
    cursor:pointer;
}

/* BIG EMOJI */
.big{
    font-size:70px;
}

/* INPUT */
input{
    padding:12px;
    width:80%;
    font-size:16px;
    border-radius:12px;
    border:1px solid #ccc;
}

/* PROGRESS BAR */
.bar{
    height:8px;
    background:#ddd;
    border-radius:20px;
    overflow:hidden;
    margin:10px;
}

.fill{
    height:100%;
    width:0%;
    background:#2ecc71;
    transition:.3s;
}
</style>
</head>

<body>

<div class="app">

<!-- PLAYER -->
<div id="player" class="screen active">
    <div class="card">
        <h2>🎮 Choose Players</h2>

        <button class="player" id="a" onclick="pick('Amerie','a')">Amerie</button>
        <button class="player" id="p" onclick="pick('Patrice','p')">Patrice</button>
        <button class="player" id="f" onclick="pick('Phoebe','f')">Phoebe</button>

        <p id="status">No players selected</p>

        <button onclick="start()" class="option" style="background:#2ecc71;color:white;">
            Start Game 🚀
        </button>
    </div>
</div>

<!-- GAME -->
<div id="game" class="screen">

    <div class="hud">
        <div id="turn"></div>
        <div>⭐ <span id="score">0</span></div>
    </div>

    <div class="bar"><div id="barFill" class="fill"></div></div>

    <div class="card" id="box"></div>

</div>

<!-- END -->
<div id="end" class="screen">
    <div class="card">
        <h2>🎉 Well Done!</h2>
        <div id="result"></div>
        <button onclick="location.reload()" class="option" style="background:#2ecc71;color:white;">
            Play Again
        </button>
    </div>
</div>

</div>

<script>

let selected=[];
let scores={};
let turn=0;
let q=0;
let current="";

/* ---------------- SELECT ---------------- */
function pick(name,id){

    if(selected.includes(name)){
        selected=selected.filter(x=>x!==name);
        document.getElementById(id).classList.remove("selected");
    } else {
        selected.push(name);
        document.getElementById(id).classList.add("selected");
    }

    document.getElementById("status").innerText =
    selected.length? "Playing: "+selected.join(", ") : "No players selected";
}

/* ---------------- START ---------------- */
function start(){
    if(selected.length===0) return;

    selected.forEach(p=>scores[p]=0);

    document.getElementById("player").classList.remove("active");
    document.getElementById("game").classList.add("active");

    next();
}

/* ---------------- TURN ---------------- */
function nextPlayer(){
    current=selected[turn%selected.length];
    turn++;
}

/* ---------------- ENGINE ---------------- */
function next(){

    if(q>=10){ end(); return; }

    q++;
    nextPlayer();

    document.getElementById("turn").innerText=current;
    document.getElementById("score").innerText=scores[current];

    document.getElementById("barFill").style.width=(q*10)+"%";

    let type=q%3;

    if(type===0) spelling();
    if(type===1) math();
    if(type===2) object();
}

/* ---------------- SPELLING (REAL ENGINE) ---------------- */
function spelling(){

    let words=[
        {w:"APPLE", img:"🍎"},
        {w:"BANANA", img:"🍌"},
        {w:"DOG", img:"🐶"},
        {w:"CAR", img:"🚗"}
    ];

    let item=words[Math.floor(Math.random()*words.length)];

    let pattern=item.w.split("").map((l,i)=>{
        if(i%2===0) return "_";
        return l;
    }).join(" ");

    current=item.w;

    render(`
        <div class="big">${item.img}</div>
        <h3>Spell the word</h3>
        <h2>${pattern}</h2>

        <input id="inp">

        <div class="option" onclick="checkSpell()">Check</div>

        <div id="fb"></div>
    `);
}

/* ---------------- MATH (VARIED) ---------------- */
function math(){

    let a=Math.floor(Math.random()*20);
    let b=Math.floor(Math.random()*10);
    let ops=["+","-","*"][Math.floor(Math.random()*3)];

    if(ops==="+") current=a+b;
    if(ops==="-") current=a-b;
    if(ops==="*") current=a*b;

    render(`
        <h3>Solve</h3>
        <h1>${a} ${ops} ${b}</h1>

        <input id="inp" type="number">

        <div class="option" onclick="checkMath()">Check</div>

        <div id="fb"></div>
    `);
}

/* ---------------- OBJECT (CATEGORIES) ---------------- */
function object(){

    let items=[
        {img:"🐶", ans:"DOG"},
        {img:"🍎", ans:"APPLE"},
        {img:"🚗", ans:"CAR"}
    ];

    let i=items[Math.floor(Math.random()*items.length)];
    current=i.ans;

    render(`
        <div class="big">${i.img}</div>
        <h3>What is this?</h3>

        <div class="option" onclick="check('DOG')">Dog</div>
        <div class="option" onclick="check('CAR')">Car</div>
        <div class="option" onclick="check('${i.ans}')">${i.ans}</div>

        <div id="fb"></div>
    `);
}

/* ---------------- RENDER ---------------- */
function render(html){
    document.getElementById("box").innerHTML=html;
}

/* ---------------- CHECK ---------------- */
function norm(v){ return String(v||"").toUpperCase().trim(); }

function checkSpell(){
    let v=norm(document.getElementById("inp").value);

    if(v===current){
        ok();
    } else {
        bad();
    }
}

function checkMath(){
    let v=Number(document.getElementById("inp").value);

    if(v===current){
        ok();
    } else {
        bad();
    }
}

function check(v){
    if(norm(v)===current) ok();
    else bad();
}

/* ---------------- FEEDBACK ---------------- */
function ok(){
    scores[currentPlayer()] += 10;
    document.getElementById("fb").innerHTML="🎉 Great!";
    setTimeout(next,600);
}

function bad(){
    document.getElementById("fb").innerHTML="😊 Try again!";
}

/* ---------------- PLAYER ---------------- */
function currentPlayer(){
    return selected[turn%selected.length];
}

/* ---------------- END ---------------- */
function end(){

    document.getElementById("game").classList.remove("active");
    document.getElementById("end").classList.add("active");

    let w=Object.keys(scores).reduce((a,b)=>scores[a]>scores[b]?a:b);

    let html=`<h3>🏆 ${w} wins!</h3>`;

    for(let p in scores){
        html+=`<p>${p}: ${scores[p]}</p>`;
    }

    document.getElementById("result").innerHTML=html;
}

</script>

</body>
</html>
