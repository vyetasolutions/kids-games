<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vyeta Kids Challenge</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #74ebd5, #ACB6E5);
    color: #333;
    text-align: center;
}

h1 {
    margin: 10px;
    color: #fff;
}

.screen {
    display: none;
    padding: 15px;
}

.active {
    display: block;
}

.card {
    background: white;
    padding: 20px;
    margin: 15px auto;
    border-radius: 20px;
    max-width: 500px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
}

.player-btn {
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    border: none;
    background: #f1f1f1;
}

.start-btn {
    padding: 12px 20px;
    border-radius: 12px;
    border: none;
    background: #2ecc71;
    color: white;
    font-size: 16px;
}

.option {
    display: block;
    padding: 12px;
    margin: 8px;
    border-radius: 12px;
    background: #f7f7f7;
    cursor: pointer;
    font-size: 18px;
}

.option:hover {
    background: #eaeaea;
}

img.question-img {
    width: 180px;
    height: 180px;
    object-fit: contain;
    margin: 10px;
}

.turn {
    font-size: 18px;
    font-weight: bold;
    color: #444;
}
</style>
</head>

<body>

<h1>Vyeta Kids Challenge 🎮</h1>

<!-- PLAYER SCREEN -->
<div id="playerScreen" class="screen active">
    <div class="card">
        <h2>Who is playing?</h2>

        <button class="player-btn" onclick="toggle('Amerie')">Amerie</button>
        <button class="player-btn" onclick="toggle('Patrice')">Patrice</button>
        <button class="player-btn" onclick="toggle('Phoebe')">Phoebe</button>

        <br><br>
        <button class="start-btn" onclick="startGame()">Start Game</button>
    </div>
</div>

<!-- GAME SCREEN -->
<div id="gameScreen" class="screen">
    <div class="card">
        <div class="turn" id="turnText"></div>
        <div>Score: <span id="score">0</span></div>
    </div>

    <div class="card" id="questionBox"></div>
</div>

<!-- END SCREEN -->
<div id="endScreen" class="screen">
    <div class="card">
        <h2>🎉 Great Job Everyone!</h2>
        <div id="results"></div>
        <button class="start-btn" onclick="location.reload()">Play Again</button>
    </div>
</div>

<script>
let selected = [];
let scores = {};
let turn = 0;
let qCount = 0;
let currentAnswer = "";
let currentPlayer = "";

function toggle(name){
    if(selected.includes(name)){
        selected = selected.filter(p => p !== name);
    } else {
        selected.push(name);
    }
}

function startGame(){
    if(selected.length === 0){
        alert("Pick at least one player!");
        return;
    }

    selected.forEach(p => scores[p] = 0);

    document.getElementById("playerScreen").classList.remove("active");
    document.getElementById("gameScreen").classList.add("active");

    nextQuestion();
}

function nextPlayer(){
    currentPlayer = selected[turn % selected.length];
    turn++;
}

function nextQuestion(){
    if(qCount >= 10){
        endGame();
        return;
    }

    qCount++;
    nextPlayer();

    document.getElementById("turnText").innerText = currentPlayer + "'s turn";
    document.getElementById("score").innerText = scores[currentPlayer];

    let type = Math.floor(Math.random()*3);

    if(type === 0) objectQ();
    if(type === 1) spellingQ();
    if(type === 2) mathQ();
}

/* IMAGE OBJECTS */
function objectQ(){
    let data = [
        {img:"🍎", ans:"Apple", options:["Apple","Banana","Car","Dog"]},
        {img:"🐶", ans:"Dog", options:["Cat","Dog","Car","Bus"]},
        {img:"🚗", ans:"Car", options:["Bike","Car","Train","Plane"]},
        {img:"🍌", ans:"Banana", options:["Apple","Banana","Orange","Chair"]}
    ];

    let q = data[Math.floor(Math.random()*data.length)];
    currentAnswer = q.ans;

    let html = `<h3>What is this?</h3>`;
    html += `<div style="font-size:70px;">${q.img}</div>`;

    q.options.forEach(o=>{
        html += `<div class='option' onclick="check('${o}')">${o}</div>`;
    });

    document.getElementById("questionBox").innerHTML = html;
}

/* SPELLING */
function spellingQ(){
    let words = ["APPLE","DOG","CAR","BOOK"];
    let w = words[Math.floor(Math.random()*words.length)];
    currentAnswer = w;

    let hidden = w.split("").map(l => Math.random()>0.5?"_":l).join(" ");

    let html = `<h3>Can you spell this?</h3>`;
    html += `<div style="font-size:60px;">🧠</div>`;
    html += `<h2>${hidden}</h2>`;
    html += `<input id="inp" placeholder="Type word" style="padding:10px;font-size:16px;">`;
    html += `<br><br><div class='option' onclick="checkSpell()">Submit</div>`;

    document.getElementById("questionBox").innerHTML = html;
}

/* MATH */
function mathQ(){
    let a = Math.floor(Math.random()*10);
    let b = Math.floor(Math.random()*10);
    let op = ["+","-"][Math.floor(Math.random()*2)];

    currentAnswer = op==="+"?a+b:a-b;

    let html = `<h3>Solve this</h3>`;
    html += `<div style="font-size:40px;">${a} ${op} ${b}</div>`;
    html += `<input id="math" type="number" style="padding:10px;">`;
    html += `<br><br><div class='option' onclick="checkMath()">Submit</div>`;

    document.getElementById("questionBox").innerHTML = html;
}

/* CHECK */
function check(ans){
    if(ans === currentAnswer) correct();
    else nextQuestion();
}

function checkSpell(){
    let v = document.getElementById("inp").value.toUpperCase();
    if(v === currentAnswer) correct();
    else nextQuestion();
}

function checkMath(){
    let v = Number(document.getElementById("math").value);
    if(v === currentAnswer) correct();
    else nextQuestion();
}

function correct(){
    scores[currentPlayer] += 10;
    document.getElementById("score").innerText = scores[currentPlayer];
    nextQuestion();
}

function endGame(){
    document.getElementById("gameScreen").classList.remove("active");
    document.getElementById("endScreen").classList.add("active");

    let winner = Object.keys(scores).reduce((a,b)=>scores[a]>scores[b]?a:b);

    let html = `<h3>🏆 Winner: ${winner}</h3>`;

    for(let p in scores){
        html += `<p>${p}: ${scores[p]} points</p>`;
    }

    document.getElementById("results").innerHTML = html;
}
</script>

</body>
</html>
