<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vyeta Balloon Ascent Arena</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        body {
            background-color: #060913;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            display: flex;
            gap: 24px;
            max-width: 1000px;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }
        .main-stage {
            flex: 2;
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 32px;
            padding: 28px;
            display: flex;
            flex-direction: column;
            height: 540px;
            position: relative;
            box-shadow: 0 40px 80px rgba(0,0,0,0.7);
        }
        .header-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            z-index: 10;
        }
        .status-pill {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
            color: #64748b;
        }
        .balance-pill {
            background: rgba(34, 197, 94, 0.06);
            border: 1px solid rgba(34, 197, 94, 0.2);
            color: #4ade80;
            padding: 10px 24px;
            border-radius: 100px;
            font-weight: 700;
            font-size: 1.15rem;
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .canvas-container {
            position: relative;
            flex: 1;
            width: 100%;
            margin: 12px 0;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            border-radius: 24px;
        }
        .live-multiplier-overlay {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 4.5rem;
            font-weight: 900;
            letter-spacing: -2px;
            pointer-events: none;
            z-index: 5;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 8px 30px rgba(0,0,0,0.7);
            transition: transform 0.1s ease;
        }
        .controls {
            width: 100%;
            display: flex;
            gap: 16px;
            z-index: 10;
        }
        input {
            width: 130px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 18px;
            color: white;
            font-size: 1.25rem;
            font-weight: 700;
            text-align: center;
            outline: none;
        }
        button {
            flex: 1;
            border: none;
            border-radius: 20px;
            font-size: 1.25rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-bet { background: #f59e0b; color: #000; box-shadow: 0 4px 20px rgba(245, 158, 11, 0.15); }
        .btn-bet:hover { transform: translateY(-2px); background: #fbbf24; }
        .btn-cash { background: #10b981; color: #fff; box-shadow: 0 4px 25px rgba(16, 185, 129, 0.25); }
        .btn-cash:hover { transform: scale(1.02); }
        .btn-disabled { background: #121724; color: #475569; cursor: not-allowed; }

        .side-panel {
            flex: 1;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 32px;
            padding: 24px;
            height: 540px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }
        .ledger-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #475569;
            margin-bottom: 16px;
            font-weight: 700;
        }
        .ledger-content {
            font-size: 0.85rem;
            color: #94a3b8;
            overflow-y: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .toast-win {
            color: #34d399;
            font-weight: 600;
            background: rgba(16, 185, 129, 0.05);
            padding: 8px 14px;
            border-radius: 12px;
            border-left: 4px solid #10b981;
        }
        .vyeta-footer {
            margin-top: 24px;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.15);
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="main-stage">
            <div class="header-panel">
                <div id="status-text" class="status-pill">Connecting...</div>
                <div class="balance-pill" id="balance-pill">Balance: $<span id="balance-display">1000.00</span></div>
            </div>

            <div class="canvas-container">
                <div id="multiplier-display" class="live-multiplier-overlay" style="color: #475569;">1.00x</div>
                <canvas id="gameCanvas"></canvas>
            </div>

            <div class="controls">
                <input type="number" id="bet-input" value="10" min="1">
                <button id="action-btn" class="btn-disabled">LOADING ENGINE</button>
            </div>
        </div>

        <div class="side-panel">
            <div class="ledger-title">Live Room Activity</div>
            <div id="ledger-content" class="ledger-content"></div>
        </div>
    </div>

    <div class="vyeta-footer">Powered by Vyeta Digital Solutions</div>

    <script>
        // CORE SERVICE CONNECTION
        const SERVER_URL = "https://kids-games-o79b.onrender.com"; 
        const socket = io(SERVER_URL);

        let currentBalance = 1000.00;
        let hasBetInRound = false;
        let isInFlight = false;
        let globalMultiplier = 1.00;
        let gameState = 'waiting'; 

        // Physics/Animation Tickers
        let floatOffset = 0;
        let particles = [];
        let burstShards = [];
        let shockwaveRadius = 0;
        let triggerShockwave = false;

        const statusText = document.getElementById('status-text');
        const balanceDisplay = document.getElementById('balance-display');
        const balancePill = document.getElementById('balance-pill');
        const multiplierDisplay = document.getElementById('multiplier-display');
        const actionBtn = document.getElementById('action-btn');
        const betInput = document.getElementById('bet-input');
        const ledgerContent = document.getElementById('ledger-content');

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function addLog(msg, isWin = false) {
            const div = document.createElement('div');
            if(isWin) div.className = "toast-win";
            div.innerText = msg;
            ledgerContent.prepend(div);
        }

        // --- ARTISTIC GRAPHICS PIPELINE ---
        function drawScene() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            let centerX = canvas.width / 2;
            let centerY = canvas.height / 2 + 20;
            
            // Generate fluid, organic floating drift using mathematical sine curves
            floatOffset += 0.04;
            if (gameState === 'flying' || gameState === 'waiting') {
                centerY += Math.sin(floatOffset) * 8; 
            }
            
            // Calculate scale growth based on server value
            let balloonSize = 45 + Math.min(globalMultiplier * 14, 120);
            
            // Multiplier text pulse effect based on growth speed
            if (gameState === 'flying') {
                let textScale = 1 + Math.min((globalMultiplier - 1) * 0.03, 0.2);
                multiplierDisplay.style.transform = `translateX(-50%) scale(${textScale})`;
            } else {
                multiplierDisplay.style.transform = `translateX(-50%) scale(1)`;
            }

            // High-tension shaking mechanics
            if (globalMultiplier > 3.5 && gameState === 'flying') {
                centerX += (Math.random() - 0.5) * (globalMultiplier * 0.9);
                centerY += (Math.random() - 0.5) * (globalMultiplier * 0.9);
            }

            // Radial background lightning gradients
            let bgGlow = ctx.createRadialGradient(centerX, centerY, 5, centerX, centerY, Math.max(balloonSize * 2.8, 220));
            if (gameState === 'flying') {
                if(globalMultiplier < 2) {
                    bgGlow.addColorStop(0, 'rgba(16, 185, 129, 0.05)');
                } else if(globalMultiplier < 5) {
                    bgGlow.addColorStop(0, 'rgba(245, 158, 11, 0.07)');
                } else {
                    bgGlow.addColorStop(0, 'rgba(239, 68, 68, 0.12)');
                }
            } else if (gameState === 'crashed') {
                bgGlow.addColorStop(0, 'rgba(239, 68, 68, 0.01)');
            }
            bgGlow.addColorStop(1, 'transparent');
            ctx.fillStyle = bgGlow;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // RENDER BALLOON
            if (gameState !== 'crashed') {
                let colorGlow;
                if (globalMultiplier < 2) {
                    colorGlow = ctx.createLinearGradient(centerX - balloonSize, centerY - balloonSize, centerX + balloonSize, centerY + balloonSize);
                    colorGlow.addColorStop(0, '#34d399');
                    colorGlow.addColorStop(1, '#059669');
                } else if (globalMultiplier < 5) {
                    colorGlow = ctx.createLinearGradient(centerX - balloonSize, centerY - balloonSize, centerX + balloonSize, centerY + balloonSize);
                    colorGlow.addColorStop(0, '#fbbf24');
                    colorGlow.addColorStop(1, '#d97706');
                } else {
                    colorGlow = ctx.createLinearGradient(centerX - balloonSize, centerY - balloonSize, centerX + balloonSize, centerY + balloonSize);
                    colorGlow.addColorStop(0, '#f87171');
                    colorGlow.addColorStop(1, '#dc2626');
                }

                // Rigid suspension ropes
                ctx.beginPath();
                ctx.strokeStyle = 'rgba(255,255,255,0.18)';
                ctx.lineWidth = 1.5;
                ctx.moveTo(centerX - balloonSize * 0.25, centerY + balloonSize * 0.4);
                ctx.lineTo(centerX - 14, centerY + balloonSize + 18);
                ctx.moveTo(centerX + balloonSize * 0.25, centerY + balloonSize * 0.4);
                ctx.lineTo(centerX + 14, centerY + balloonSize + 18);
                ctx.stroke();

                // Cargo basket
                ctx.fillStyle = '#221816';
                ctx.beginPath();
                ctx.roundRect(centerX - 16, centerY + balloonSize + 18, 32, 22, 5);
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.08)';
                ctx.stroke();

                // Balloon envelope structure
                ctx.beginPath();
                ctx.fillStyle = colorGlow;
                ctx.arc(centerX, centerY, balloonSize, 0, Math.PI * 2);
                ctx.fill();
                
                // Outer structural glass-glare
                ctx.beginPath();
                ctx.fillStyle = 'rgba(255,255,255,0.06)';
                ctx.arc(centerX - balloonSize * 0.25, centerY - balloonSize * 0.25, balloonSize * 0.65, 0, Math.PI * 2);
                ctx.fill();
            }

            // WINNER CELEBRATION SHOCKWAVE EFFECT
            if (triggerShockwave) {
                shockwaveRadius += 18;
                ctx.beginPath();
                ctx.strokeStyle = `rgba(52, 211, 153, ${Math.max(1 - (shockwaveRadius / 350), 0)})`;
                ctx.lineWidth = 5;
                ctx.arc(centerX, centerY, shockwaveRadius, 0, Math.PI * 2);
                ctx.stroke();
                if (shockwaveRadius > 350) triggerShockwave = false;
            }

            // WINNER CASH FLOW PARTICLES (MAGNETIC PULL)
            let targetX = canvas.width - 80;
            let targetY = -40; 
            
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += (targetX - p.x) * 0.12;
                p.y += (targetY - p.y) * 0.12;
                p.alpha -= 0.004;

                ctx.save();
                ctx.globalAlpha = Math.max(p.alpha, 0);
                ctx.fillStyle = '#34d399';
                ctx.shadowColor = '#10b981';
                ctx.shadowBlur = 12;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();

                if (Math.abs(p.x - targetX) < 20 && Math.abs(p.y - targetY) < 20) {
                    particles.splice(i, 1);
                    balancePill.style.transform = "scale(1.12)";
                    setTimeout(() => balancePill.style.transform = "scale(1)", 120);
                }
            }

            // CATASTROPHIC BURST PARTICLES (EXPLOSION FRAGMENTS)
            for (let i = burstShards.length - 1; i >= 0; i--) {
                let s = burstShards[i];
                s.x += s.vx;
                s.y += s.vy;
                s.vy += 0.15; // Realistic gravity fall downward
                s.alpha -= 0.015;

                ctx.save();
                ctx.globalAlpha = Math.max(s.alpha, 0);
                ctx.fillStyle = s.color;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();

                if (s.alpha <= 0) burstShards.splice(i, 1);
            }

            requestAnimationFrame(drawScene);
        }
        requestAnimationFrame(drawScene);

        // TRIGGER EMOTIVE CELEBRATION
        function triggerWinAnimation() {
            shockwaveRadius = 0;
            triggerShockwave = true;
            let startX = canvas.width / 2;
            let startY = canvas.height / 2 + 20 + Math.sin(floatOffset) * 8;
            
            for(let i=0; i<45; i++){
                particles.push({
                    x: startX + (Math.random() - 0.5) * 30,
                    y: startY + (Math.random() - 0.5) * 30,
                    size: Math.random() * 5 + 3,
                    alpha: 1.2
                });
            }
        }

        // TRIGGER BURST EXPLOSION
        function triggerBurstAnimation(finalSize) {
            let startX = canvas.width / 2;
            let startY = canvas.height / 2 + 20 + Math.sin(floatOffset) * 8;
            let fragmentColor = globalMultiplier < 2 ? '#059669' : globalMultiplier < 5 ? '#d97706' : '#dc2626';

            // Spawn 60 velocity shrapnel components shooting outwards randomly
            for (let i = 0; i < 60; i++) {
                let angle = Math.random() * Math.PI * 2;
                let speed = Math.random() * 8 + 4;
                burstShards.push({
                    x: startX,
                    y: startY,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    size: Math.random() * 6 + 2,
                    color: fragmentColor,
                    alpha: 1.0
                });
            }
        }

        // --- CUSTOMER-CENTRIC SERVER LISTENERS ---

        socket.on('betting_phase_started', () => {
            gameState = 'waiting';
            isInFlight = false;
            hasBetInRound = false;
            globalMultiplier = 1.00;
            
            statusText.innerText = "Prepare for takeoff... (6s)";
            statusText.style.color = "#f59e0b";
            multiplierDisplay.style.color = "#475569";
            multiplierDisplay.innerText = "1.00x";
            
            actionBtn.className = "btn-bet";
            actionBtn.innerText = "INFLATE BALLOON";
            betInput.disabled = false;
        });

        socket.on('game_started', () => {
            gameState = 'flying';
            isInFlight = true;
            statusText.innerText = "Balloon is rising";
            statusText.style.color = "#10b981";
            multiplierDisplay.style.color = "#10b981";

            if (hasBetInRound) {
                actionBtn.className = "btn-cash";
                actionBtn.innerText = "CASH OUT";
            } else {
                actionBtn.className = "btn-disabled";
                actionBtn.innerText = "FLIGHT IN PROGRESS";
            }
        });

        socket.on('multiplier_tick', (data) => {
            globalMultiplier = data.multiplier;
            multiplierDisplay.innerText = data.multiplier.toFixed(2) + "x";
            
            if(globalMultiplier >= 2 && globalMultiplier < 5) {
                multiplierDisplay.style.color = "#f59e0b";
            } else if (globalMultiplier >= 5) {
                multiplierDisplay.style.color = "#ef4444";
            }

            if (hasBetInRound) {
                const liveWinnings = (parseFloat(betInput.value) * data.multiplier).toFixed(2);
                actionBtn.innerText = `CASH OUT ($${liveWinnings})`;
            }
        });

        socket.on('game_crashed', (data) => {
            let finalSize = 45 + Math.min(globalMultiplier * 14, 120);
            gameState = 'crashed';
            isInFlight = false;
            globalMultiplier = data.crashedAt;
            
            triggerBurstAnimation(finalSize);
            
            statusText.innerText = "Balloon burst!";
            statusText.style.color = "#ef4444";
            multiplierDisplay.style.color = "#ef4444";
            multiplierDisplay.innerText = data.crashedAt.toFixed(2) + "x";
            
            actionBtn.className = "btn-disabled";
            actionBtn.innerText = "BURST!";
            betInput.disabled = false;
        });

        socket.on('bet_confirmed', (data) => {
            hasBetInRound = true;
            currentBalance = data.balance;
            balanceDisplay.innerText = currentBalance.toFixed(2);
            actionBtn.className = "btn-disabled";
            actionBtn.innerText = "SECURING CASH...";
            betInput.disabled = true;
        });

        socket.on('cash_out_success', (data) => {
            hasBetInRound = false;
            currentBalance = data.balance;
            balanceDisplay.innerText = currentBalance.toFixed(2);
            actionBtn.className = "btn-disabled";
            actionBtn.innerText = "EARNINGS SECURED!";
            
            triggerWinAnimation();
            addLog(`Success! You securely collected $${data.winnings}`, true);
        });

        socket.on('ledger_update', (data) => {
            // Translate server system text into warm friendly interactions
            let userMsg = data.message.replace("Player placed a", "Someone added a");
            userMsg = userMsg.replace("Player cashed out", "Someone collected");
            userMsg = userMsg.replace("at", "at a safe");
            addLog(userMsg);
        });

        socket.on('error_message', (data) => { alert(data.message); });

        actionBtn.addEventListener('click', () => {
            if (!isInFlight && !hasBetInRound) {
                socket.emit('place_bet', { amount: betInput.value });
            } else if (isInFlight && hasBetInRound) {
                socket.emit('cash_out');
            }
        });
    </script>
</body>
</html>
