<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vyeta Kids Challenge</title>

<style>
body {
    margin: 0;
    font-family: "Arial", sans-serif;
    background: linear-gradient(135deg, #6dd5fa, #2980b9);
    color: #fff;
    text-align: center;
}

h1 {
    margin-top: 20px;
    font-size: 28px;
}

.screen {
    display: none;
    padding: 20px;
}

.active {
    display: block;
}

.card {
    background: rgba(255,255,255,0.15);
    padding: 20px;
    margin: 15px auto;
    border-radius: 15px;
    max-width: 500px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
}

button {
    padding: 12px 18px;
    margin: 8px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
}

.choice {
    background: #fff;
    color: #333;
}

.choice:hover {
    background: #f1f1f1;
}

.start-btn {
    background: #2ecc71;
    color: white;
}

.next-btn {
    background: #f39c12;
    color: white;
}

.player-btn {
    background: #fff;
    color: #333;
}

.active-player {
    border: 3px solid yellow;
}

input {
    padding: 10px;
    border-radius: 8px;
    border: none;
    font-size: 16px;
    width: 80%;
}
</style>
</head>

<body>

<h1>Vyeta Kids Challenge</h1>

<!-- PLAYER SCREEN -->
<div id="playerScreen" class="screen active">
    <div class="card">
        <h2>Select Players</h2>
        <button class="player-btn" onclick="togglePlayer('Amerie')">Amerie</button>
        <button class="player-btn" onclick="togglePlayer('Patrice')">Patrice</button>
        <button class="player-btn" onclick="togglePlayer('Phoebe')">Phoebe</button>
        <br><br>
        <button class="start-btn" onclick="startGame()">Start Game</button>
    </div>
</div>

<!-- GAME SCREEN -->
<div id="gameScreen" class="screen">
    <div class="card">
        <h2 id="playerTurn"></h2>
        <h3>Score: <span id="score">0</span></h3>
    </div>

    <div class="card" id="questionBox"></div>
</div>

<!-- END SCREEN -->
<div id="endScreen" class="screen">
    <div class="card">
        <h2>Game Over!</h2>
        <div id="results"></div>
        <button class="start-btn" onclick="location.reload()">Play Again</button>
    </div>
</div>

<script>
const players = ["Amerie","Patrice","Phoebe"];
let selectedPlayers = [];
let scores = {};
let turnIndex = 0;
let questionCount = 0;
let currentAnswer = "";
let currentPlayer = "";

function togglePlayer(name){
    if(selectedPlayers.includes(name)){
        selectedPlayers = selectedPlayers.filter(p => p !== name);
    } else {
        selectedPlayers.push(name);
    }
    alert("Selected: " + selectedPlayers.join(", "));
}

function startGame(){
    if(selectedPlayers.length === 0){
        alert("Select at least one player");
        return;
    }

    selectedPlayers.forEach(p => scores[p] = 0);

    document.getElementById("playerScreen").classList.remove("active");
    document.getElementById("gameScreen").classList.add("active");

    nextQuestion();
}

function nextPlayer(){
    currentPlayer = selectedPlayers[turnIndex % selectedPlayers.length];
    turnIndex++;
}

function nextQuestion(){
    if(questionCount >= 10){
        endGame();
        return;
    }

    questionCount++;
    nextPlayer();

    document.getElementById("playerTurn").innerText = currentPlayer + "'s Turn";
    document.getElementById("score").innerText = scores[currentPlayer];

    let type = Math.floor(Math.random()*3);

    if(type === 0) objectQuestion();
    if(type === 1) spellingQuestion();
    if(type === 2) mathQuestion();
}

/* OBJECT QUESTION */
function objectQuestion(){
    let items = [
        {q:"Apple", options:["Apple","Banana","Car","Dog"]},
        {q:"Dog", options:["Cat","Dog","Car","Ball"]},
        {q:"Car", options:["Bus","Bike","Car","Train"]},
        {q:"Banana", options:["Apple","Banana","Orange","Chair"]}
    ];

    let item = items[Math.floor(Math.random()*items.length)];
    currentAnswer = item.q;

    let html = `<h3>What is this?</h3>`;

    item.options.forEach(opt=>{
        html += `<button class='choice' onclick="checkAnswer('${opt}')">${opt}</button>`;
    });

    document.getElementById("questionBox").innerHTML = html;
}

/* SPELLING QUESTION */
function spellingQuestion(){
    let words = ["APPLE","DOG","CAR","BOOK"];
    let word = words[Math.floor(Math.random()*words.length)];
    currentAnswer = word;

    let hidden = word.split("").map(l => Math.random()>0.5 ? "_" : l).join(" ");

    let html = `<h3>Spell the word</h3><h2>${hidden}</h2>`;
    html += `<input id="spellInput" placeholder="Type word"/>`;
    html += `<br><button class='start-btn' onclick="checkSpelling()">Submit</button>`;

    document.getElementById("questionBox").innerHTML = html;
}

/* MATH QUESTION */
function mathQuestion(){
    let a = Math.floor(Math.random()*20);
    let b = Math.floor(Math.random()*20);
    let ops = ["+","-"];
    let op = ops[Math.floor(Math.random()*ops.length)];

    if(op === "+") currentAnswer = a + b;
    if(op === "-") currentAnswer = a - b;

    let html = `<h3>Solve</h3><h2>${a} ${op} ${b} = ?</h2>`;
    html += `<input id="mathInput" type="number" />`;
    html += `<br><button class='start-btn' onclick="checkMath()">Submit</button>`;

    document.getElementById("questionBox").innerHTML = html;
}

/* CHECKS */
function checkAnswer(ans){
    if(ans === currentAnswer) correct();
    else nextQuestion();
}

function checkSpelling(){
    let val = document.getElementById("spellInput").value.toUpperCase();
    if(val === currentAnswer) correct();
    else nextQuestion();
}

function checkMath(){
    let val = Number(document.getElementById("mathInput").value);
    if(val === currentAnswer) correct();
    else nextQuestion();
}

/* SCORE */
function correct(){
    scores[currentPlayer] += 10;
    alert("Correct! +10");
    nextQuestion();
}

/* END GAME */
function endGame(){
    document.getElementById("gameScreen").classList.remove("active");
    document.getElementById("endScreen").classList.add("active");

    let winner = Object.keys(scores).reduce((a,b)=>scores[a]>scores[b]?a:b);

    let html = `<h3>Winner: ${winner}</h3>`;

    for(let p in scores){
        html += `<p>${p}: ${scores[p]} points</p>`;
    }

    document.getElementById("results").innerHTML = html;
}
</script>

</body>
</html>
