<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vyeta Kids Challenge</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#74ebd5,#ACB6E5);
    height:100vh;
    overflow:hidden;
}

/* APP */
.app{
    height:100vh;
    display:flex;
    flex-direction:column;
}

/* SCREEN */
.screen{
    display:none;
    flex:1;
    flex-direction:column;
    padding:12px;
    box-sizing:border-box;
}

.active{
    display:flex;
}

/* HUD */
.hud{
    background:white;
    padding:14px;
    border-radius:18px;
    display:flex;
    justify-content:space-between;
    font-size:20px;
    font-weight:bold;
}

/* CARD */
.card{
    flex:1;
    background:white;
    border-radius:26px;
    margin:10px 0;
    padding:20px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

/* TEXT */
h2{ font-size:34px; margin:10px 0; }
h3{ font-size:26px; margin:10px 0; }

/* BIG ICON */
.big{
    font-size:90px;
}

/* BUTTONS */
.option{
    width:100%;
    padding:18px;
    margin:10px 0;
    border-radius:16px;
    background:#f2f2f2;
    font-size:22px;
    cursor:pointer;
}

.option:active{
    transform:scale(0.98);
}

/* INPUT */
input{
    width:90%;
    padding:16px;
    font-size:22px;
    border-radius:14px;
    border:1px solid #ccc;
}

/* PLAYER */
.player{
    padding:16px;
    margin:8px;
    border-radius:16px;
    border:none;
    font-size:18px;
    background:#eee;
}

.player.selected{
    background:#2ecc71;
    color:white;
}

/* PROGRESS */
.bar{
    height:10px;
    background:#ddd;
    border-radius:20px;
    overflow:hidden;
    margin:10px 0;
}

.fill{
    height:100%;
    width:0%;
    background:#2ecc71;
    transition:.3s;
}

/* FEEDBACK */
#fb{
    font-size:22px;
    margin-top:10px;
    min-height:30px;
}
</style>
</head>

<body>

<div class="app">

<!-- PLAYER SELECT -->
<div id="player" class="screen active">
    <div class="card">
        <h2>🎮 Choose Players</h2>

        <button class="player" id="a" onclick="pick('Amerie','a')">Amerie</button>
        <button class="player" id="p" onclick="pick('Patrice','p')">Patrice</button>
        <button class="player" id="f" onclick="pick('Phoebe','f')">Phoebe</button>

        <p id="status">Select players</p>

        <button class="option" onclick="start()" style="background:#2ecc71;color:white;">
            Start Game 🚀
        </button>
    </div>
</div>

<!-- GAME -->
<div id="game" class="screen">

    <div class="hud">
        <div id="turn"></div>
        <div>⭐ Score: <span id="score">0</span></div>
    </div>

    <div class="bar"><div id="barFill" class="fill"></div></div>

    <div class="card" id="box"></div>
</div>

<!-- END -->
<div id="end" class="screen">
    <div class="card">
        <h2>🎉 Great Job!</h2>
        <div id="result"></div>

        <button class="option" onclick="location.reload()" style="background:#2ecc71;color:white;">
            Play Again
        </button>
    </div>
</div>

</div>

<script>

let selected=[];
let scores={};
let turn=0;
let q=0;
let current="";
let currentPlayer="";

/* ---------------- SELECT ---------------- */
function pick(name,id){

    if(selected.includes(name)){
        selected=selected.filter(x=>x!==name);
        document.getElementById(id).classList.remove("selected");
    } else {
        selected.push(name);
        document.getElementById(id).classList.add("selected");
    }

    document.getElementById("status").innerText =
    selected.length ? "Playing: "+selected.join(", ") : "Select players";
}

/* ---------------- START ---------------- */
function start(){
    if(selected.length===0) return;

    selected.forEach(p=>scores[p]=0);

    document.getElementById("player").classList.remove("active");
    document.getElementById("game").classList.add("active");

    next();
}

/* ---------------- TURN ---------------- */
function nextPlayer(){
    currentPlayer = selected[turn % selected.length];
    turn++;
}

/* ---------------- GAME LOOP ---------------- */
function next(){

    if(q>=10){
        end();
        return;
    }

    q++;
    nextPlayer();

    document.getElementById("turn").innerText =
        "🎮 " + currentPlayer + "'s Turn";

    document.getElementById("score").innerText = scores[currentPlayer];

    document.getElementById("barFill").style.width = (q*10)+"%";

    let type = q % 3;

    if(type===0) spelling();
    if(type===1) math();
    if(type===2) object();
}

/* ---------------- SPELLING ENGINE ---------------- */
function spelling(){

    let words=[
        {w:"APPLE", img:"🍎"},
        {w:"BANANA", img:"🍌"},
        {w:"DOG", img:"🐶"},
        {w:"CAR", img:"🚗"},
        {w:"BOOK", img:"📘"}
    ];

    let item=words[Math.floor(Math.random()*words.length)];

    let pattern=item.w.split("").map((l,i)=>{
        return i%2===0 ? "_" : l;
    }).join(" ");

    current=item.w;

    render(`
        <div class="big">${item.img}</div>
        <h3>Spell this word</h3>
        <h2>${pattern}</h2>

        <input id="inp">

        <div class="option" onclick="checkSpell()">Check</div>

        <div id="fb"></div>
    `);
}

/* ---------------- MATH ENGINE ---------------- */
function math(){

    let a=Math.floor(Math.random()*20);
    let b=Math.floor(Math.random()*10);
    let ops=["+","-","*"][Math.floor(Math.random()*3)];

    if(ops==="+") current=a+b;
    if(ops==="-") current=a-b;
    if(ops==="*") current=a*b;

    render(`
        <h3>Solve</h3>
        <h1>${a} ${ops} ${b}</h1>

        <input id="inp" type="number">

        <div class="option" onclick="checkMath()">Check</div>

        <div id="fb"></div>
    `);
}

/* ---------------- OBJECT ENGINE ---------------- */
function object(){

    let items=[
        {img:"🐶", ans:"DOG"},
        {img:"🍎", ans:"APPLE"},
        {img:"🚗", ans:"CAR"},
        {img:"🍌", ans:"BANANA"}
    ];

    let i=items[Math.floor(Math.random()*items.length)];
    current=i.ans;

    render(`
        <div class="big">${i.img}</div>
        <h3>What is this?</h3>

        <div class="option" onclick="check('DOG')">Dog</div>
        <div class="option" onclick="check('CAR')">Car</div>
        <div class="option" onclick="check('${i.ans}')">${i.ans}</div>

        <div id="fb"></div>
    `);
}

/* ---------------- RENDER ---------------- */
function render(html){
    document.getElementById("box").innerHTML=html;
}

/* ---------------- VALIDATION ---------------- */
function norm(v){
    return String(v||"").toUpperCase().trim();
}

function checkSpell(){

    let v=norm(document.getElementById("inp").value);

    if(v===current){
        correct();
    } else {
        wrong();
    }
}

function checkMath(){

    let v=Number(document.getElementById("inp").value);

    if(v===current){
        correct();
    } else {
        wrong();
    }
}

function check(v){

    if(norm(v)===current){
        correct();
    } else {
        wrong();
    }
}

/* ---------------- FEEDBACK ---------------- */
function correct(){

    scores[currentPlayer]+=10;

    document.getElementById("fb").innerHTML="🎉 Correct!";
    setTimeout(next,700);
}

function wrong(){
    document.getElementById("fb").innerHTML="😊 Try again!";
}

/* ---------------- END ---------------- */
function end(){

    document.getElementById("game").classList.remove("active");
    document.getElementById("end").classList.add("active");

    let winner=Object.keys(scores).reduce((a,b)=>scores[a]>scores[b]?a:b);

    let html=`<h3>🏆 ${winner} wins!</h3>`;

    for(let p in scores){
        html+=`<p>${p}: ${scores[p]} ⭐</p>`;
    }

    document.getElementById("result").innerHTML=html;
}

</script>

</body>
</html>
