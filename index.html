<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleek Balloon Ascent Arena</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        body {
            background-color: #05070f;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            display: flex;
            gap: 24px;
            max-width: 1000px;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }
        .main-stage {
            flex: 2;
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 32px;
            padding: 28px;
            display: flex;
            flex-direction: column;
            height: 520px;
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }
        .header-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            z-index: 10;
        }
        .status-pill {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
            color: #64748b;
        }
        .balance-pill {
            background: rgba(34, 197, 94, 0.08);
            border: 1px solid rgba(34, 197, 94, 0.2);
            color: #4ade80;
            padding: 8px 20px;
            border-radius: 100px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }
        .canvas-container {
            position: relative;
            flex: 1;
            width: 100%;
            margin: 16px 0;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            border-radius: 20px;
        }
        .live-multiplier-overlay {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: -2px;
            pointer-events: none;
            z-index: 5;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .controls {
            width: 100%;
            display: flex;
            gap: 16px;
            z-index: 10;
        }
        input {
            width: 120px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 18px;
            color: white;
            font-size: 1.2rem;
            font-weight: 700;
            text-align: center;
            outline: none;
        }
        button {
            flex: 1;
            border: none;
            border-radius: 20px;
            font-size: 1.2rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-bet { background: #eab308; color: #000; box-shadow: 0 0 20px rgba(234, 179, 8, 0.2); }
        .btn-cash { background: #22c55e; color: #fff; box-shadow: 0 0 25px rgba(34, 197, 94, 0.3); }
        .btn-disabled { background: #131926; color: #475569; cursor: not-allowed; box-shadow: none; }

        .side-panel {
            flex: 1;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 32px;
            padding: 24px;
            height: 520px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }
        .ledger-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #475569;
            margin-bottom: 16px;
            font-weight: 700;
        }
        .ledger-content {
            font-size: 0.85rem;
            color: #94a3b8;
            overflow-y: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .toast-win {
            color: #4ade80;
            font-weight: 600;
            background: rgba(34, 197, 94, 0.05);
            padding: 6px 12px;
            border-radius: 10px;
            border-left: 3px solid #22c55e;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="main-stage">
            <div class="header-panel">
                <div id="status-text" class="status-pill">System Booting...</div>
                <div class="balance-pill" id="balance-pill">$<span id="balance-display">1000.00</span></div>
            </div>

            <div class="canvas-container">
                <div id="multiplier-display" class="live-multiplier-overlay" style="color: #64748b;">1.00x</div>
                <canvas id="gameCanvas"></canvas>
            </div>

            <div class="controls">
                <input type="number" id="bet-input" value="10" min="1">
                <button id="action-btn" class="btn-disabled">INITIALIZING</button>
            </div>
        </div>

        <div class="side-panel">
            <div class="ledger-title">Arena Activity Ledger</div>
            <div id="ledger-content" class="ledger-content"></div>
        </div>
    </div>

    <script>
        // REPLACE WITH YOUR EXACT LIVE RENDER SERVER URL WITHOUT A TRAILING SLASH
        const SERVER_URL = "https://kids-games-o79b.onrender.com"; 
        const socket = io(SERVER_URL);

        let currentBalance = 1000.00;
        let hasBetInRound = false;
        let isInFlight = false;
        let globalMultiplier = 1.00;
        let gameState = 'waiting'; // 'waiting', 'flying', 'crashed'

        // DOM elements
        const statusText = document.getElementById('status-text');
        const balanceDisplay = document.getElementById('balance-display');
        const balancePill = document.getElementById('balance-pill');
        const multiplierDisplay = document.getElementById('multiplier-display');
        const actionBtn = document.getElementById('action-btn');
        const betInput = document.getElementById('bet-input');
        const ledgerContent = document.getElementById('ledger-content');

        // Canvas Setup
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Particle Assets for Winnings
        let particles = [];
        let shockwaveRadius = 0;
        let triggerShockwave = false;

        function addLog(msg, isWin = false) {
            const div = document.createElement('div');
            if(isWin) div.className = "toast-win";
            div.innerText = msg;
            ledgerContent.prepend(div);
        }

        // --- ARTISTIC GRAPHICS ENGINE (HTML5 CANVAS) ---
        function drawScene() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            let centerX = canvas.width / 2;
            let centerY = canvas.height / 2 + 30;
            
            // 1. Calculate dynamic scaling parameter based on server multiplier
            let balloonSize = 40 + Math.min(globalMultiplier * 12, 110);
            
            // Add structural tension shaking at premium risk zones
            if (globalMultiplier > 4 && gameState === 'flying') {
                centerX += (Math.random() - 0.5) * (globalMultiplier * 0.6);
                centerY += (Math.random() - 0.5) * (globalMultiplier * 0.6);
            }

            // 2. Render atmospheric sky background glow
            let bgGlow = ctx.createRadialGradient(centerX, centerY, 10, centerX, centerY, Math.max(balloonSize * 2.5, 200));
            if (gameState === 'flying') {
                if(globalMultiplier < 2) {
                    bgGlow.addColorStop(0, 'rgba(34, 197, 94, 0.04)');
                } else if(globalMultiplier < 5) {
                    bgGlow.addColorStop(0, 'rgba(234, 179, 8, 0.05)');
                } else {
                    bgGlow.addColorStop(0, 'rgba(239, 68, 68, 0.08)');
                }
            } else if (gameState === 'crashed') {
                bgGlow.addColorStop(0, 'rgba(239, 68, 68, 0.02)');
            }
            bgGlow.addColorStop(1, 'transparent');
            ctx.fillStyle = bgGlow;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 3. Render the Hot Air Balloon Asset if alive
            if (gameState !== 'crashed') {
                // Calculate dynamic color shift based on multiplier value
                let colorGlow;
                if (globalMultiplier < 2) {
                    colorGlow = ctx.createLinearGradient(centerX - balloonSize, centerY - balloonSize, centerX + balloonSize, centerY + balloonSize);
                    colorGlow.addColorStop(0, '#10b981');
                    colorGlow.addColorStop(1, '#059669');
                } else if (globalMultiplier < 5) {
                    colorGlow = ctx.createLinearGradient(centerX - balloonSize, centerY - balloonSize, centerX + balloonSize, centerY + balloonSize);
                    colorGlow.addColorStop(0, '#f59e0b');
                    colorGlow.addColorStop(1, '#d97706');
                } else {
                    colorGlow = ctx.createLinearGradient(centerX - balloonSize, centerY - balloonSize, centerX + balloonSize, centerY + balloonSize);
                    colorGlow.addColorStop(0, '#ef4444');
                    colorGlow.addColorStop(1, '#dc2626');
                }

                // Strings/Rigging Lines
                ctx.beginPath();
                ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                ctx.lineWidth = 1.5;
                ctx.moveTo(centerX - balloonSize * 0.3, centerY + balloonSize * 0.4);
                ctx.lineTo(centerX - 12, centerY + balloonSize + 15);
                ctx.moveTo(centerX + balloonSize * 0.3, centerY + balloonSize * 0.4);
                ctx.lineTo(centerX + 12, centerY + balloonSize + 15);
                ctx.stroke();

                // Wicker Basket Holding Cash
                ctx.fillStyle = '#271c19';
                ctx.beginPath();
                ctx.roundRect(centerX - 15, centerY + balloonSize + 15, 30, 20, 4);
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.1)';
                ctx.stroke();

                // The Balloon Envelope Main Body
                ctx.beginPath();
                ctx.fillStyle = colorGlow;
                ctx.arc(centerX, centerY, balloonSize, 0, Math.PI * 2);
                ctx.fill();
                
                // Sleek High-end Inner Highlight
                ctx.beginPath();
                ctx.fillStyle = 'rgba(255,255,255,0.08)';
                ctx.arc(centerX - balloonSize*0.2, centerY - balloonSize*0.2, balloonSize * 0.6, 0, Math.PI * 2);
                ctx.fill();
            } else {
                // Render Confetti/Burst remnants if popped
                ctx.font = "30px Arial";
                ctx.textAlign = "center";
                ctx.fillStyle = "rgba(255,255,255,0.15)";
                ctx.fillText("💥 POPPED", centerX, centerY);
            }

            // 4. WINNER GAME JUICE LAYER: Animated Shockwave
            if (triggerShockwave) {
                shockwaveRadius += 14;
                ctx.beginPath();
                ctx.strokeStyle = `rgba(234, 179, 8, ${Math.max(1 - (shockwaveRadius / 300), 0)})`;
                ctx.lineWidth = 4;
                ctx.arc(centerX, centerY, shockwaveRadius, 0, Math.PI * 2);
                ctx.stroke();
                if (shockwaveRadius > 300) {
                    triggerShockwave = false;
                }
            }

            // 5. WINNER GAME JUICE LAYER: Flight Cash Particles
            let targetX = canvas.width - 60;
            let targetY = -20; // Coordinates pulling up toward Balance Pill
            
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += (targetX - p.x) * 0.09;
                p.y += (targetY - p.y) * 0.09;
                p.alpha -= 0.005;

                ctx.save();
                ctx.globalAlpha = Math.max(p.alpha, 0);
                ctx.fillStyle = '#4ade80';
                ctx.shadowColor = '#22c55e';
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();

                // Remove particle when it hits the visual target pill
                if (Math.abs(p.x - targetX) < 15 && Math.abs(p.y - targetY) < 15) {
                    particles.splice(i, 1);
                    // Pulsate UI component visually upon particle contact
                    balancePill.style.transform = "scale(1.08)";
                    setTimeout(() => balancePill.style.transform = "scale(1)", 100);
                }
            }

            requestAnimationFrame(drawScene);
        }
        requestAnimationFrame(drawScene);

        function triggerWinJuice() {
            shockwaveRadius = 0;
            triggerShockwave = true;
            let startX = canvas.width / 2;
            let startY = canvas.height / 2 + 30;
            
            // Instantiate 35 magnetic cash velocity items
            for(let i=0; i<35; i++){
                particles.push({
                    x: startX + (Math.random() - 0.5) * 40,
                    y: startY + (Math.random() - 0.5) * 40,
                    size: Math.random() * 4 + 3,
                    alpha: 1.0
                });
            }
        }

        // --- INCOMING NETWORK EVENT LISTENERS ---

        socket.on('initial_state', (data) => {
            currentBalance = data.balance;
            balanceDisplay.innerText = currentBalance.toFixed(2);
        });

        socket.on('betting_phase_started', () => {
            gameState = 'waiting';
            isInFlight = false;
            hasBetInRound = false;
            globalMultiplier = 1.00;
            
            statusText.innerText = "INFLATION LOCK OPEN (6s)";
            statusText.style.color = "#eab308";
            multiplierDisplay.style.color = "#64748b";
            multiplierDisplay.innerText = "1.00x";
            
            actionBtn.className = "btn-bet";
            actionBtn.innerText = "INFLATE BALLOON";
            betInput.disabled = false;
        });

        socket.on('game_started', () => {
            gameState = 'flying';
            isInFlight = true;
            statusText.innerText = "BALLOON ASCENDING";
            statusText.style.color = "#22c55e";
            multiplierDisplay.style.color = "#22c55e";

            if (hasBetInRound) {
                actionBtn.className = "btn-cash";
                actionBtn.innerText = "CASH OUT";
            } else {
                actionBtn.className = "btn-disabled";
                actionBtn.innerText = "ASCENT IN PROGRESS";
            }
        });

        socket.on('multiplier_tick', (data) => {
            globalMultiplier = data.multiplier;
            multiplierDisplay.innerText = data.multiplier.toFixed(2) + "x";
            
            // Adjust multiplier color threshold as danger escalates
            if(globalMultiplier >= 2 && globalMultiplier < 5) {
                multiplierDisplay.style.color = "#eab308";
            } else if (globalMultiplier >= 5) {
                multiplierDisplay.style.color = "#ef4444";
            }

            if (hasBetInRound) {
                const liveWinnings = (parseFloat(betInput.value) * data.multiplier).toFixed(2);
                actionBtn.innerText = `CASH OUT ($${liveWinnings})`;
            }
        });

        socket.on('game_crashed', (data) => {
            gameState = 'crashed';
            isInFlight = false;
            globalMultiplier = data.crashedAt;
            
            statusText.innerText = "BURST! POPPED OUT";
            statusText.style.color = "#ef4444";
            multiplierDisplay.style.color = "#ef4444";
            multiplierDisplay.innerText = data.crashedAt.toFixed(2) + "x";
            
            actionBtn.className = "btn-disabled";
            actionBtn.innerText = "BURST!";
            betInput.disabled = false;
        });

        socket.on('bet_confirmed', (data) => {
            hasBetInRound = true;
            currentBalance = data.balance;
            balanceDisplay.innerText = currentBalance.toFixed(2);
            actionBtn.className = "btn-disabled";
            actionBtn.innerText = "VALUATION LOCKED";
            betInput.disabled = true;
        });

        socket.on('cash_out_success', (data) => {
            hasBetInRound = false;
            currentBalance = data.balance;
            balanceDisplay.innerText = currentBalance.toFixed(2);
            actionBtn.className = "btn-disabled";
            actionBtn.innerText = "SECURED WINS!";
            
            triggerWinJuice();
            addLog(`Ascent Secured! You cashed out $${data.winnings}`, true);
        });

        socket.on('ledger_update', (data) => {
            addLog(data.message);
        });

        socket.on('error_message', (data) => {
            alert(data.message);
        });

        // --- CONTROL BUTTON ACTION TRIGGER ---
        actionBtn.addEventListener('click', () => {
            if (!isInFlight && !hasBetInRound) {
                const amount = betInput.value;
                socket.emit('place_bet', { amount });
            } else if (isInFlight && hasBetInRound) {
                socket.emit('cash_out');
            }
        });
    </script>
</body>
</html>
