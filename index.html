<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vyeta Kids Challenge</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#74ebd5,#ACB6E5);
    overflow:hidden;
}

/* SCREEN SYSTEM */
.screen{
    display:none;
    height:100vh;
    padding:15px;
    box-sizing:border-box;
}

.active{ display:block; }

/* GAME LAYOUT */
.hud{
    background:white;
    border-radius:20px;
    padding:12px;
    margin-bottom:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card{
    background:white;
    border-radius:25px;
    padding:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
    text-align:center;
    animation:pop .3s ease;
}

@keyframes pop{
    from{ transform:scale(.95); opacity:.5; }
    to{ transform:scale(1); opacity:1; }
}

/* PLAYER SELECT */
.player{
    padding:12px;
    margin:8px;
    border:none;
    border-radius:15px;
    background:#eee;
    font-size:16px;
}

.player.selected{
    background:#2ecc71;
    color:white;
}

/* GAME ELEMENTS */
.big{
    font-size:70px;
}

.option{
    display:block;
    padding:14px;
    margin:10px;
    border-radius:15px;
    background:#f5f5f5;
    font-size:18px;
    cursor:pointer;
    transition:.2s;
}

.option:hover{
    background:#e8e8e8;
}

/* FEEDBACK */
#feedback{
    margin-top:10px;
    font-weight:bold;
    min-height:20px;
}

.correct{ color:#2ecc71; }
.wrong{ color:#e67e22; }

input{
    padding:12px;
    font-size:16px;
    border-radius:12px;
    border:1px solid #ccc;
    width:80%;
}
</style>
</head>

<body>

<!-- PLAYER SCREEN -->
<div id="playerScreen" class="screen active">
    <div class="card">
        <h2>🎮 Who is playing?</h2>

        <button class="player" id="a" onclick="toggle('Amerie','a')">Amerie</button>
        <button class="player" id="p" onclick="toggle('Patrice','p')">Patrice</button>
        <button class="player" id="f" onclick="toggle('Phoebe','f')">Phoebe</button>

        <p id="status">Select players to start</p>

        <button onclick="startGame()" style="padding:12px 20px;border:none;border-radius:15px;background:#2ecc71;color:white;font-size:16px;">
            Start Adventure 🚀
        </button>
    </div>
</div>

<!-- GAME SCREEN -->
<div id="gameScreen" class="screen">

    <div class="hud">
        <div id="turn">Player</div>
        <div>⭐ <span id="score">0</span></div>
    </div>

    <div class="card" id="gameBox"></div>
</div>

<!-- END SCREEN -->
<div id="endScreen" class="screen">
    <div class="card">
        <h2>🎉 Adventure Complete!</h2>
        <div id="results"></div>

        <button onclick="location.reload()"
        style="margin-top:10px;padding:12px 20px;border:none;border-radius:15px;background:#2ecc71;color:white;">
        Play Again
        </button>
    </div>
</div>

<script>

let selected=[];
let scores={};
let turn=0;
let q=0;
let current="";
let currentAnswer="";

/* ---------------- SELECT ---------------- */
function toggle(name,id){

    if(selected.includes(name)){
        selected=selected.filter(x=>x!==name);
        document.getElementById(id).classList.remove("selected");
    } else {
        selected.push(name);
        document.getElementById(id).classList.add("selected");
    }

    document.getElementById("status").innerText =
    selected.length? "Playing: "+selected.join(", ") : "Select players";
}

/* ---------------- START ---------------- */
function startGame(){
    if(selected.length===0) return;

    selected.forEach(p=>scores[p]=0);

    document.getElementById("playerScreen").classList.remove("active");
    document.getElementById("gameScreen").classList.add("active");

    next();
}

/* ---------------- TURN ---------------- */
function nextPlayer(){
    current = selected[turn % selected.length];
    turn++;
}

/* ---------------- GAME LOOP ---------------- */
function next(){

    if(q>=10){
        end();
        return;
    }

    q++;
    nextPlayer();

    document.getElementById("turn").innerText = "👤 " + current;
    document.getElementById("score").innerText = scores[current];

    let type = q % 3;

    if(type===0) spelling();
    if(type===1) math();
    if(type===2) object();
}

/* ---------------- SPELLING ENGINE (REAL LEARNING) ---------------- */
function spelling(){

    let words=[
        {w:"APPLE", img:"🍎"},
        {w:"DOG", img:"🐶"},
        {w:"CAR", img:"🚗"},
        {w:"BOOK", img:"📘"}
    ];

    let item = words[Math.floor(Math.random()*words.length)];

    // learning structure
    let pattern = item.w.split("").map((l,i)=>{
        return i%2===0 ? "_" : l;
    }).join(" ");

    currentAnswer = item.w;

    document.getElementById("gameBox").innerHTML=`
        <div class="big">${item.img}</div>
        <h3>Can you spell this?</h3>

        <h2>${pattern}</h2>

        <input id="input" placeholder="Type word">

        <div class="option" onclick="checkSpell()">Check Answer</div>

        <div id="feedback"></div>
    `;
}

/* ---------------- MATH ---------------- */
function math(){

    let a=Math.floor(Math.random()*10);
    let b=Math.floor(Math.random()*10);

    currentAnswer=a+b;

    document.getElementById("gameBox").innerHTML=`
        <h3>Solve this</h3>
        <h1>${a} + ${b}</h1>

        <input id="input" type="number">

        <div class="option" onclick="checkMath()">Check Answer</div>

        <div id="feedback"></div>
    `;
}

/* ---------------- OBJECT ---------------- */
function object(){

    let items=[
        {img:"🍌", ans:"BANANA"},
        {img:"🐶", ans:"DOG"},
        {img:"🚗", ans:"CAR"}
    ];

    let item=items[Math.floor(Math.random()*items.length)];
    currentAnswer=item.ans;

    document.getElementById("gameBox").innerHTML=`
        <div class="big">${item.img}</div>
        <h3>What is this?</h3>

        <div class="option" onclick="check('DOG')">Dog</div>
        <div class="option" onclick="check('CAR')">Car</div>
        <div class="option" onclick="check('${item.ans}')">${item.ans}</div>

        <div id="feedback"></div>
    `;
}

/* ---------------- VALIDATION ---------------- */
function normalize(v){
    return String(v||"").toUpperCase().trim();
}

function checkSpell(){
    let v=normalize(document.getElementById("input").value);

    if(v===currentAnswer){
        correct();
    } else {
        wrong();
    }
}

function checkMath(){
    let v=Number(document.getElementById("input").value);

    if(v===currentAnswer){
        correct();
    } else {
        wrong();
    }
}

function check(v){
    if(normalize(v)===currentAnswer){
        correct();
    } else {
        wrong();
    }
}

/* ---------------- FEEDBACK ---------------- */
function correct(){
    scores[current]+=10;
    document.getElementById("feedback").innerHTML="🎉 Great job!";
    document.getElementById("feedback").className="correct";

    setTimeout(next,800);
}

function wrong(){
    document.getElementById("feedback").innerHTML="😊 Try again!";
    document.getElementById("feedback").className="wrong";
}

/* ---------------- END ---------------- */
function end(){

    document.getElementById("gameScreen").classList.remove("active");
    document.getElementById("endScreen").classList.add("active");

    let winner=Object.keys(scores).reduce((a,b)=>scores[a]>scores[b]?a:b);

    let html=`<h3>🏆 Winner: ${winner}</h3>`;

    for(let p in scores){
        html+=`<p>${p}: ${scores[p]} ⭐</p>`;
    }

    document.getElementById("results").innerHTML=html;
}

</script>

</body>
</html>
