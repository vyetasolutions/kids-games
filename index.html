<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vyeta Kwacha Balloon Adventures</title>
    <!-- Google Fonts for crisp modern interface typography -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Socket.io Client Implementation -->
    <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.7.2/dist/socket.io.min.js"></script>
    <style>
        :root {
            --bg-space: #0b0f19;
            --glass-bg: rgba(15, 23, 42, 0.45);
            --glass-border: rgba(255, 255, 255, 0.08);
            --neon-cyan: #00e5ff;
            --neon-green: #10b981;
            --neon-red: #ef4444;
            --neon-amber: #f59e0b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-space);
            color: var(--text-main);
        }

        /* Loading Screen Overlay */
        #intro-loader {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, #1e1b4b 0%, var(--bg-space) 100%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s ease;
        }

        .loader-spinner {
            width: 80px;
            height: 80px;
            border: 4px solid var(--glass-border);
            border-top-color: var(--neon-cyan);
            border-radius: 50%;
            animation: spin 1.2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            margin-bottom: 24px;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.2);
        }

        /* Core Game Container Layout */
        #game-viewport {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: grid;
            grid-template-rows: auto 1fr auto;
        }

        /* Top Bar & FIXED Progress Button Layout */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: linear-gradient(to bottom, rgba(11, 15, 25, 0.8), transparent);
            z-index: 10;
        }

        .brand-logo {
            font-weight: 800;
            font-size: 1.25rem;
            letter-spacing: -0.5px;
            background: linear-gradient(90deg, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .wallet-pill {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(12px);
            padding: 8px 16px;
            border-radius: 99px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            color: var(--neon-green);
        }

        /* FIX: Save Progress Button constrained safely from trailing off right-side screen boundaries */
        #save-progress-btn {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: max-content;
            max-width: 100%;
            white-space: nowrap;
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid rgba(0, 229, 255, 0.3);
            color: var(--neon-cyan);
            padding: 8px 16px;
            border-radius: 99px;
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        #save-progress-btn:hover {
            background: rgba(0, 229, 255, 0.2);
            box-shadow: 0 0 12px rgba(0, 229, 255, 0.3);
        }

        /* Canvas Arena Window */
        .canvas-container {
            position: absolute;
            inset: 0;
            z-index: 1;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Heads Up Display (HUD) Overlays */
        .hud-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 80px 24px 24px 24px;
        }

        .live-multiplier-display {
            align-self: center;
            text-align: center;
            margin-top: 40px;
        }

        #multiplier-text {
            font-size: 5.5rem;
            font-weight: 900;
            letter-spacing: -2px;
            text-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
            color: var(--text-main);
            transition: color 0.1s ease;
        }

        #game-status-label {
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
        }

        /* Premium Glassmorphic Layout Control Board */
        .control-board {
            grid-row: 3;
            z-index: 10;
            padding: 24px;
            background: linear-gradient(to top, rgba(11, 15, 25, 0.95), rgba(11, 15, 25, 0.7));
            border-top: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 24px;
        }

        @media (max-width: 768px) {
            .control-board {
                grid-template-columns: 1fr;
                padding: 16px;
            }
            #multiplier-text { font-size: 3.75rem; }
        }

        .bet-interface-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Vehicle Selector Styling Matrix */
        .vehicle-matrix {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .vehicle-option {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .vehicle-option:hover {
            border-color: rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.03);
        }

        .vehicle-option.active {
            border-color: var(--neon-cyan);
            background: rgba(0, 229, 255, 0.08);
            box-shadow: 0 0 12px rgba(0, 229, 255, 0.15);
        }

        .vehicle-name {
            font-size: 0.85rem;
            font-weight: 700;
            display: block;
            margin-top: 4px;
        }

        /* Input Controls Setup */
        .input-group-row {
            display: flex;
            gap: 12px;
            pointer-events: auto;
        }

        .amount-input-wrapper {
            position: relative;
            flex: 1;
        }

        .amount-input-wrapper span {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-weight: 700;
            color: var(--text-muted);
        }

        .bet-input-field {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 16px 16px 16px 44px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 700;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .bet-input-field:focus {
            border-color: rgba(255,255,255,0.25);
        }

        /* Action Buttons Core Execution Configurations */
        .action-button {
            flex: 1;
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: -0.3px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            color: #fff;
        }

        .btn-bet {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.4);
        }

        .btn-bet:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.6);
        }

        .btn-cashout {
            background: linear-gradient(135deg, #10b981 0%, #047857 100%);
            box-shadow: 0 4px 14px rgba(16, 185, 129, 0.4);
        }

        .btn-cashout:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.6);
        }

        .btn-disabled {
            background: #1e293b !important;
            color: var(--text-muted) !important;
            cursor: not-allowed !important;
            box-shadow: none !important;
            transform: none !important;
        }

        /* Flight Activity Stream Ledger */
        .ledger-panel {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            pointer-events: auto;
        }

        .ledger-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 12px;
            font-weight: 700;
        }

        .ledger-stream {
            flex: 1;
            overflow-y: auto;
            max-height: 110px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .ledger-entry {
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            animation: fadeIn 0.25s ease-out;
        }

        /* Success Splash Toast Popups */
        #cashout-toast {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: rgba(16, 185, 129, 0.95);
            border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(12px);
            padding: 20px 40px;
            border-radius: 20px;
            text-align: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        #cashout-toast.visible {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <!-- Loading Screen Setup Section -->
    <div id="intro-loader">
        <div class="loader-spinner"></div>
        <h3 style="font-weight:700; margin-bottom:6px;">Connecting to Launch Site</h3>
        <p style="color:var(--text-muted); font-size:0.87rem;">Assembling craft variations and checking air pressure...</p>
    </div>

    <!-- Main Live Game Layout Display -->
    <div id="game-viewport">
        
        <header>
            <div class="brand-logo">KWACHA BALLOON ADVENTURES</div>
            <div class="header-actions">
                <div class="wallet-pill">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"/><path d="M4 6v12a2 2 0 0 0 2 2h14v-4"/><path d="M18 12a2 2 0 0 0-2 2v2a2 2 0 0 0 2 2h4v-6Z"/></svg>
                    <span id="balance-display">ZK 0.00</span>
                </div>
                <!-- Fixed width max-content block execution wrapper -->
                <button id="save-progress-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                    Save Progress
                </button>
            </div>
        </header>

        <div class="canvas-container">
            <canvas id="flight-arena"></canvas>
        </div>

        <div class="hud-overlay">
            <div class="live-multiplier-display">
                <div id="multiplier-text">1.00x</div>
                <div id="game-status-label">Accepting Flight Tickets</div>
            </div>
        </div>

        <!-- System User Action Interactive Grid -->
        <div class="control-board">
            <div class="bet-interface-panel">
                <!-- Vehicle Selector Interface Grid Matrix -->
                <div class="vehicle-matrix">
                    <div class="vehicle-option active" data-vehicle="balloon">
                        <span style="font-size:1.5rem;">🎈</span>
                        <span class="vehicle-name">Kwacha Balloon</span>
                    </div>
                    <div class="vehicle-option" data-vehicle="lwango">
                        <span style="font-size:1.5rem;">🧺</span>
                        <span class="vehicle-name">Traditional Lwango</span>
                    </div>
                    <div class="vehicle-option" data-vehicle="broom">
                        <span style="font-size:1.5rem;">🧹</span>
                        <span class="vehicle-name">Mystic Broomstick</span>
                    </div>
                </div>

                <div class="input-group-row">
                    <div class="amount-input-wrapper">
                        <span>ZK</span>
                        <input type="number" id="bet-input" class="bet-input-field" value="10" min="1" max="10000" step="1">
                    </div>
                    <button id="action-btn" class="action-button btn-bet">BUY FLIGHT TICKET</button>
                </div>
            </div>

            <div class="ledger-panel">
                <div class="ledger-title">Live Flight Activity</div>
                <div id="ledger-stream" class="ledger-stream">
                    <!-- Real-time dynamic game state messages stream down here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Win Splash Toast Component -->
    <div id="cashout-toast">
        <h2 style="font-size:1.8rem; font-weight:800; margin-bottom:4px;">FLIGHT SECURED!</h2>
        <p id="toast-payout-details" style="font-size:1.1rem; font-weight:600; opacity:0.95;">You earned ZK 0.00</p>
    </div>

    <!-- Frontend Core Operational Physics Execution Script -->
    <script>
        const SERVER_URL = "https://kids-games-o79b.onrender.com";
        let socket;
        
        // State Machine Cache Mapping
        let currentBalance = 0;
        let currentMultiplier = 1.00;
        let gameStatus = "BETTING"; // BETTING, IN_FLIGHT, CRASHED
        let activeVehicle = "balloon";
        let clientBetState = "NONE"; // NONE, PLACED, CASHED_OUT
        let currentBetAmount = 0;

        // Graphic Physics Configuration State System Maps
        const canvas = document.getElementById('flight-arena');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let craftX = 100;
        let craftY = 400;
        let targetCraftY = 400;
        let ambientStars = [];

        // UI Element References
        const actionBtn = document.getElementById('action-btn');
        const betInput = document.getElementById('bet-input');
        const multiplierText = document.getElementById('multiplier-text');
        const statusLabel = document.getElementById('game-status-label');
        const balanceDisplay = document.getElementById('balance-display');
        const ledgerStream = document.getElementById('ledger-stream');

        // Clean user handling initialization 
        window.addEventListener('DOMContentLoaded', () => {
            initCanvasResolution();
            generateStarfieldGrid();
            connectGameSessionWebsockets();
            setupInterfaceInteractions();
            window.addEventListener('resize', initCanvasResolution);
            
            // Artificial initialization safety loop delay to present highly-polished environment spin configuration load setups
            setTimeout(() => {
                document.getElementById('intro-loader').style.opacity = 0;
                setTimeout(() => document.getElementById('intro-loader').remove(), 600);
            }, 2500);

            // Execute high performance requestAnimationFrame loop tracker mapping configuration
            requestAnimationFrame(renderCorePhysicsArenaFrame);
        });

        function initCanvasResolution() {
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);
            craftY = rect.height * 0.65;
            targetCraftY = craftY;
        }

        function generateStarfieldGrid() {
            ambientStars = [];
            for(let i=0; i<60; i++) {
                ambientStars.push({
                    x: Math.random() * window.innerWidth,
                    y: Math.random() * window.innerHeight,
                    size: Math.random() * 2,
                    brightness: Math.random()
                });
            }
        }

        function setupInterfaceInteractions() {
            // Vehicle Select Configuration Hooks
            document.querySelectorAll('.vehicle-option').forEach(opt => {
                opt.addEventListener('click', () => {
                    if(gameStatus === "IN_FLIGHT" && clientBetState === "PLACED") return; // Frame-lock choices during running operations
                    document.querySelectorAll('.vehicle-option').forEach(o => o.classList.remove('active'));
                    opt.classList.add('active');
                    activeVehicle = opt.dataset.vehicle;
                });
            });

            // Action Primary Button Processing Trigger Framework Mapping
            actionBtn.addEventListener('click', () => {
                if(gameStatus === "BETTING" && clientBetState === "NONE") {
                    const amt = parseInt(betInput.value);
                    if(isNaN(amt) || amt <= 0 || amt > currentBalance) {
                        alert("Please enter a valid ticket price within your budget allocation layout.");
                        return;
                    }
                    currentBetAmount = amt;
                    socket.emit('place_bet', { amount: amt, vehicle: activeVehicle });
                } else if(gameStatus === "IN_FLIGHT" && clientBetState === "PLACED") {
                    socket.emit('cash_out');
                }
            });
        }

        function connectGameSessionWebsockets() {
            // Check for persistent token architecture mock parameters
            let localToken = localStorage.getItem('vyeta_kwacha_token');
            if(!localToken) {
                localToken = "anon_" + Math.random().toString(36).substring(2, 15);
                localStorage.setItem('vyeta_kwacha_token', localToken);
            }

            socket = io(SERVER_URL, {
                auth: { token: localToken },
                transports: ['websocket']
            });

            socket.on('initial_state', (data) => {
                currentBalance = data.balance;
                updateBalanceInterfaceElement();
                logFlightEvent("Systems Online. Ready for departure calculations.");
            });

            socket.on('betting_phase_started', (data) => {
                gameStatus = "BETTING";
                clientBetState = "NONE";
                currentMultiplier = 1.00;
                multiplierText.innerText = "1.00x";
                multiplierText.style.color = "var(--text-main)";
                statusLabel.innerText = "Accepting Flight Tickets";
                
                actionBtn.className = "action-button btn-bet";
                actionBtn.innerText = "BUY FLIGHT TICKET";
                betInput.removeAttribute('disabled');
            });

            socket.on('bet_confirmed', (data) => {
                clientBetState = "PLACED";
                currentBalance = data.newBalance;
                updateBalanceInterfaceElement();
                actionBtn.className = "action-button btn-disabled";
                actionBtn.innerText = "TICKET SECURED!";
                betInput.setAttribute('disabled', 'true');
                logFlightEvent("Your craft registration has been approved.");
            });

            socket.on('game_started', () => {
                gameStatus = "IN_FLIGHT";
                statusLabel.innerText = "In Flight - Multiplier Rising";
                if(clientBetState === "PLACED") {
                    actionBtn.className = "action-button btn-cashout";
                    actionBtn.innerText = `CASH OUT (ZK ${(currentBetAmount * 1.00).toFixed(2)})`;
                }
                logFlightEvent("Lift-off achieved. Good luck pilots!");
            });

            socket.on('multiplier_tick', (data) => {
                if(gameStatus !== "IN_FLIGHT") return;
                currentMultiplier = data.multiplier;
                multiplierText.innerText = currentMultiplier.toFixed(2) + "x";
                
                // Color scaling dynamically shift over standard flight intervals
                if(currentMultiplier > 5.0) multiplierText.style.color = "var(--neon-red)";
                else if(currentMultiplier > 2.0) multiplierText.style.color = "var(--neon-amber)";

                if(clientBetState === "PLACED") {
                    actionBtn.innerText = `CASH OUT (ZK ${(currentBetAmount * currentMultiplier).toFixed(2)})`;
                }
            });

            socket.on('cash_out_success', (data) => {
                clientBetState = "CASHED_OUT";
                currentBalance = data.newBalance;
                updateBalanceInterfaceElement();
                
                actionBtn.className = "action-button btn-disabled";
                actionBtn.innerText = "EARNINGS SECURED";
                
                const toast = document.getElementById('cashout-toast');
                document.getElementById('toast-payout-details').innerText = `You earned ZK ${data.payout.toFixed(2)}`;
                toast.classList.add('visible');
                setTimeout(() => toast.classList.remove('visible'), 2500);
                
                if (navigator.vibrate) navigator.vibrate([40, 50, 40]);
                logFlightEvent(`You safely touched down at ${data.atMultiplier.toFixed(2)}x`);
            });

            socket.on('game_crashed', (data) => {
                gameStatus = "CRASHED";
                statusLabel.innerText = "FLIGHT TERMINATED";
                multiplierText.innerText = "CRASHED @" + data.crashedAt.toFixed(2) + "x";
                multiplierText.style.color = "var(--neon-red)";
                
                actionBtn.className = "action-button btn-disabled";
                actionBtn.innerText = "CRAFT DOWN";
                betInput.setAttribute('disabled', 'true');
                
                // Spawn dramatic explosion burst at current point calculations
                triggerExplosionBurst(craftX, craftY);
                logFlightEvent(`Craft lost signal at ${data.crashedAt.toFixed(2)}x`);
            });

            socket.on('ledger_update', (msg) => {
                logFlightEvent(msg);
            });
        }

        function updateBalanceInterfaceElement() {
            balanceDisplay.innerText = "ZK " + currentBalance.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function logFlightEvent(text) {
            const entry = document.createElement('div');
            entry.className = "ledger-entry";
            entry.innerHTML = `<span style="color:var(--text-muted)">[${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'})}]</span> <span>${text}</span>`;
            ledgerStream.prepend(entry);
            if(ledgerStream.children.length > 15) ledgerStream.lastChild.remove();
        }

        function triggerExplosionBurst(x, y) {
            for(let i=0; i<45; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 12,
                    vy: (Math.random() - 0.5) * 12,
                    radius: Math.random() * 6 + 2,
                    color: Math.random() > 0.4 ? 'rgba(239, 68, 68, 0.9)' : 'rgba(245, 158, 11, 0.9)',
                    alpha: 1,
                    decay: Math.random() * 0.03 + 0.015
                });
            }
        }

        // Complete Hardware High Performance Real-Time Rendering Engine
        function renderCorePhysicsArenaFrame() {
            const w = canvas.width / (window.devicePixelRatio || 1);
            const h = canvas.height / (window.devicePixelRatio || 1);
            
            // Clean space atmosphere redraw loop
            ctx.clearRect(0, 0, w, h);
            
            // Ambient Sky Speed Shifting Base Coordinates Gradient
            let skyGrad = ctx.createLinearGradient(0, 0, 0, h);
            if (gameStatus === "IN_FLIGHT") {
                let shift = Math.min(currentMultiplier * 15, 85);
                skyGrad.addColorStop(0, `#${Math.round(11 + shift*0.2).toString(16).padStart(2,'0')}0f${Math.round(25 + shift*0.5).toString(16).padStart(2,'0')}`);
                skyGrad.addColorStop(1, '#0b0f19');
            } else {
                skyGrad.addColorStop(0, '#111726');
                skyGrad.addColorStop(1, '#0b0f19');
            }
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, w, h);

            // Parallax Ambient Space Grid Speed Stars Processing Loop
            ambientStars.forEach(star => {
                if(gameStatus === "IN_FLIGHT") {
                    star.x -= (currentMultiplier * 1.5);
                    if(star.x < 0) {
                        star.x = w;
                        star.y = Math.random() * h;
                    }
                }
                ctx.fillStyle = `rgba(255, 255, 255, ${star.brightness * (0.4 + Math.sin(Date.now()*0.002)*0.3)})`;
                ctx.fillRect(star.x, star.y, star.size, star.size);
            });

            // Handle Flight Physics Trajectory Target Coordinates
            if (gameStatus === "IN_FLIGHT") {
                craftX = Math.min(100 + (currentMultiplier * 25), w * 0.45);
                targetCraftY = h * 0.7 - (Math.log(currentMultiplier + 1) * h * 0.18);
                craftY += (targetCraftY - craftY) * 0.08; // Smooth dampening frame transitions

                // Procedurally output engine trail sparks at exhaust port positions
                if (Math.random() > 0.15) {
                    particles.push({
                        x: craftX - 15,
                        y: craftY + (activeVehicle === "balloon" ? 20 : 5),
                        vx: - (Math.random() * 4 + currentMultiplier),
                        vy: (Math.random() - 0.5) * 2,
                        radius: Math.random() * 3 + 1,
                        color: activeVehicle === "broom" ? 'rgba(147, 51, 234, 0.7)' : 'rgba(0, 229, 255, 0.7)',
                        alpha: 1,
                        decay: 0.02
                    });
                }
            } else if(gameStatus === "BETTING") {
                craftX = 100;
                // Elegant passive atmospheric float/bobbing wave calculation loop to give the crafts life when idle
                targetCraftY = h * 0.65 + Math.sin(Date.now() * 0.004) * 6;
                craftY += (targetCraftY - craftY) * 0.1;
            }

            // Loop Process Trails/Explosions Particles Array Elements
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.alpha -= p.decay;
                if(p.alpha <= 0) {
                    particles.splice(i, 1);
                    continue;
                }
                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.shadowBlur = 10;
                ctx.shadowColor = p.color;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }

            // Render Selected Active Craft Variation Vectors if system not currently crashed out
            if(gameStatus !== "CRASHED") {
                ctx.save();
                ctx.shadowBlur = 25;
                ctx.shadowColor = 'rgba(0, 229, 255, 0.4)';
                
                if (activeVehicle === "balloon") {
                    drawKwachaBalloonVector(craftX, craftY);
                } else if (activeVehicle === "lwango") {
                    drawLwangoBasketVector(craftX, craftY);
                } else if (activeVehicle === "broom") {
                    drawBroomstickVector(craftX, craftY);
                }
                
                ctx.restore();
            }

            requestAnimationFrame(renderCorePhysicsArenaFrame);
        }

        // High fidelity procedural asset layout vectors rendering system blocks
        function drawKwachaBalloonVector(x, y) {
            // Envelope Balloon Shape
            let grad = ctx.createRadialGradient(x, y-25, 5, x, y-25, 30);
            grad.addColorStop(0, '#f43f5e');
            grad.addColorStop(1, '#be123c');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(x, y - 25, 28, 0, Math.PI * 2);
            ctx.fill();

            // Burner flame element tracking indicators
            if (gameStatus === "IN_FLIGHT" && Math.random() > 0.2) {
                ctx.fillStyle = 'rgba(245, 158, 11, 0.9)';
                ctx.beginPath();
                ctx.moveTo(x - 4, y - 2); ctx.lineTo(x + 4, y - 2); ctx.lineTo(x, y + 6);
                ctx.closePath();
                ctx.fill();
            }

            // Rigging lines strings structures
            ctx.strokeStyle = '#94a3b8';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(x - 12, y - 10); ctx.lineTo(x - 8, y + 8);
            ctx.moveTo(x + 12, y - 10); ctx.lineTo(x + 8, y + 8);
            ctx.stroke();

            // Passenger Basket Base Box Container Model
            ctx.fillStyle = '#78350f';
            ctx.fillRect(x - 10, y + 8, 20, 14);
            
            // Human Pilot Silhouette Representation Inside Basket
            ctx.fillStyle = '#e2e8f0';
            ctx.beginPath();
            ctx.arc(x, y + 4, 4, 0, Math.PI*2); // Head
            ctx.fill();
        }

        function drawLwangoBasketVector(x, y) {
            // Draw Traditional Zambian Woven Winnowing Basket Side Profile View
            ctx.strokeStyle = '#d97706';
            ctx.lineWidth = 3;
            ctx.fillStyle = '#b45309';
            
            ctx.beginPath();
            // Shallow woven bowl arc calculation
            ctx.arc(x, y, 26, 0, Math.PI, false);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // Native Cross Pattern Weaving Accent Texture Lines Overlay lines
            ctx.strokeStyle = 'rgba(251, 191, 36, 0.4)';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(x - 20, y + 10); ctx.lineTo(x + 20, y + 10);
            ctx.moveTo(x - 12, y + 18); ctx.lineTo(x + 12, y + 18);
            ctx.stroke();

            // Human Passenger Sitting Securely Inside the Lwango Unit Box
            ctx.fillStyle = '#f1f5f9';
            ctx.beginPath();
            ctx.arc(x, y - 6, 5, 0, Math.PI * 2); // Head component
            ctx.fill();
            
            // Body torso structure torso leaning forward gracefully inside the vessel flight line
            ctx.fillStyle = '#cbd5e1';
            ctx.fillRect(x - 4, y - 1, 9, 10);
        }

        function drawBroomstickVector(x, y) {
            // Broomstick long primary handle bar shaft array vector tracking coordinate
            ctx.strokeStyle = '#854d0e';
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(x - 32, y + 8);
            ctx.lineTo(x + 28, y - 6);
            ctx.stroke();

            // Bristle sweeping tail bundle arrays back left profile element boundaries
            ctx.fillStyle = '#ca8a04';
            ctx.beginPath();
            ctx.moveTo(x - 30, y + 8);
            ctx.lineTo(x - 48, y + 18);
            ctx.lineTo(x - 46, y + 2);
            ctx.closePath();
            ctx.fill();

            // Binding rope bands lines wrap markers
            ctx.strokeStyle = '#ef4444';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(x - 33, y + 7);
            ctx.lineTo(x - 31, y + 10);
            ctx.stroke();

            // Active Rider Leaning Low Over Shaft Straddling Stick System Map Coordinates
            ctx.fillStyle = '#f8fafc';
            ctx.beginPath();
            ctx.arc(x + 4, y - 8, 5, 0, Math.PI * 2); // Rider Head Unit
            ctx.fill();

            // Curved body suit outline structure leaning aggressively into high speed slipstream aerodynamics
            ctx.fillStyle = '#38bdf8';
            ctx.beginPath();
            ctx.moveTo(x - 6, y + 2);
            ctx.lineTo(x + 4, y - 3);
            ctx.lineTo(x + 10, y + 4);
            ctx.lineTo(x - 2, y + 6);
            ctx.closePath();
            ctx.fill();
        }
    </script>
