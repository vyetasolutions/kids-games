<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vyeta Kids Challenge</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#74ebd5,#ACB6E5);
    text-align:center;
}

h1 { color:white; }

.screen { display:none; padding:20px; }
.active { display:block; }

.card {
    background:white;
    margin:15px auto;
    padding:20px;
    max-width:500px;
    border-radius:20px;
    box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

/* PLAYER BUTTONS */
.player-btn {
    padding:12px;
    margin:6px;
    border:none;
    border-radius:12px;
    background:#eee;
    cursor:pointer;
}

.player-btn.selected {
    background:#2ecc71;
    color:white;
}

/* GAME UI */
.turn {
    font-weight:bold;
    font-size:18px;
}

.option {
    display:block;
    padding:12px;
    margin:8px;
    border-radius:12px;
    background:#f3f3f3;
    cursor:pointer;
}

.option:hover {
    background:#e0e0e0;
}

.big {
    font-size:60px;
}
</style>
</head>

<body>

<h1>Vyeta Kids Challenge 🎮</h1>

<!-- PLAYER SCREEN -->
<div id="playerScreen" class="screen active">
    <div class="card">
        <h2>Select Players</h2>

        <button id="bA" class="player-btn" onclick="toggle('Amerie','bA')">Amerie</button>
        <button id="bP" class="player-btn" onclick="toggle('Patrice','bP')">Patrice</button>
        <button id="bF" class="player-btn" onclick="toggle('Phoebe','bF')">Phoebe</button>

        <p id="status">No players selected</p>

        <button onclick="start()" style="padding:12px;background:#2ecc71;color:white;border:none;border-radius:10px;">
            Start Game
        </button>
    </div>
</div>

<!-- GAME -->
<div id="gameScreen" class="screen">
    <div class="card">
        <div id="turn"></div>
        Score: <span id="score">0</span>
    </div>

    <div class="card" id="question"></div>
</div>

<!-- END -->
<div id="endScreen" class="screen">
    <div class="card">
        <h2>🎉 Game Complete!</h2>
        <div id="result"></div>
        <button onclick="location.reload()" style="padding:12px;background:#2ecc71;color:white;border:none;border-radius:10px;">
            Play Again
        </button>
    </div>
</div>

<script>
let selected = [];
let scores = {};
let turn = 0;
let q = 0;
let currentPlayer = "";

/* ---------------- PLAYER SELECT ---------------- */
function toggle(name, btnId){
    if(selected.includes(name)){
        selected = selected.filter(p=>p!==name);
        document.getElementById(btnId).classList.remove("selected");
    } else {
        selected.push(name);
        document.getElementById(btnId).classList.add("selected");
    }

    document.getElementById("status").innerText =
        selected.length ? "Playing: " + selected.join(", ") : "No players selected";
}

/* ---------------- START ---------------- */
function start(){
    if(selected.length===0){
        alert("Select players first");
        return;
    }

    selected.forEach(p=>scores[p]=0);

    document.getElementById("playerScreen").classList.remove("active");
    document.getElementById("gameScreen").classList.add("active");

    next();
}

/* ---------------- TURN SYSTEM ---------------- */
function nextPlayer(){
    currentPlayer = selected[turn % selected.length];
    turn++;
}

/* ---------------- QUESTION ENGINE ---------------- */
function next(){
    if(q>=10){
        end();
        return;
    }

    q++;
    nextPlayer();

    document.getElementById("turn").innerText =
        currentPlayer + "'s turn";

    document.getElementById("score").innerText = scores[currentPlayer];

    let type = q % 3;

    if(type===0) spelling();
    if(type===1) math();
    if(type===2) object();
}

/* ---------------- SPELLING (STRUCTURED) ---------------- */
function spelling(){
    let words = ["APPLE","DOG","CAT","BOOK"];
    let w = words[Math.floor(Math.random()*words.length)];

    let pattern = w.split("").map((l,i)=>{
        if(i%2===0) return "_";
        return l;
    }).join(" ");

    renderQuestion("Spell the word", pattern, w);
}

/* ---------------- MATH (STRUCTURED) ---------------- */
function math(){
    let a = Math.floor(Math.random()*10);
    let b = Math.floor(Math.random()*10);
    let answer = a + b;

    renderInput(`${a} + ${b} = ?`, answer);
}

/* ---------------- OBJECT ---------------- */
function object(){
    let data = [
        {img:"🍎", ans:"Apple"},
        {img:"🐶", ans:"Dog"},
        {img:"🚗", ans:"Car"}
    ];

    let o = data[Math.floor(Math.random()*data.length)];

    let html = `
        <div class="big">${o.img}</div>
        <h3>What is this?</h3>
        <div>
            <div class="option" onclick="check('${o.ans}','${o.ans}')">${o.ans}</div>
            <div class="option" onclick="check('X','${o.ans}')">Wrong</div>
            <div class="option" onclick="check('X','${o.ans}')">Wrong</div>
        </div>
    `;

    document.getElementById("question").innerHTML = html;
}

/* ---------------- RENDER HELPERS ---------------- */
function renderQuestion(title, pattern, answer){
    document.getElementById("question").innerHTML = `
        <h3>${title}</h3>
        <h2>${pattern}</h2>
        <input id="inp">
        <br><br>
        <div class="option" onclick="check(document.getElementById('inp').value.toUpperCase(),'${answer}')">
            Submit
        </div>
    `;
}

function renderInput(q, answer){
    document.getElementById("question").innerHTML = `
        <h3>${q}</h3>
        <input id="inp" type="number">
        <br><br>
        <div class="option" onclick="check(Number(document.getElementById('inp').value),${answer})">
            Submit
        </div>
    `;
}

/* ---------------- CHECK ---------------- */
function check(val, ans){
    if(val==ans){
        scores[currentPlayer]+=10;
    }
    next();
}

/* ---------------- END ---------------- */
function end(){
    document.getElementById("gameScreen").classList.remove("active");
    document.getElementById("endScreen").classList.add("active");

    let winner = Object.keys(scores).reduce((a,b)=>scores[a]>scores[b]?a:b);

    let html = `<h3>🏆 Winner: ${winner}</h3>`;
    for(let p in scores){
        html += `<p>${p}: ${scores[p]}</p>`;
    }

    document.getElementById("result").innerHTML = html;
}
</script>

</body>
</html>
