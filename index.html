<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vyeta Kids Challenge</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#74ebd5,#ACB6E5);
    height:100vh;
    overflow:hidden;
}

.app{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.screen{
    display:none;
    width:100%;
    max-width:420px;
    height:95vh;
    flex-direction:column;
}

.active{ display:flex; }

.card{
    flex:1;
    background:white;
    margin:10px;
    border-radius:26px;
    padding:20px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
    animation:pop .25s ease;
}

@keyframes pop{
    from{transform:scale(.95);opacity:.6;}
    to{transform:scale(1);opacity:1;}
}

.hud{
    background:white;
    margin:10px;
    padding:12px;
    border-radius:18px;
    display:flex;
    justify-content:space-between;
    font-size:18px;
    font-weight:bold;
}

.big{ font-size:85px; }

h2{ font-size:32px; }
h3{ font-size:24px; }

.option{
    width:100%;
    padding:16px;
    margin:8px 0;
    border-radius:16px;
    background:#f2f2f2;
    font-size:20px;
    cursor:pointer;
    transition:.15s;
}

.option:active{ transform:scale(.97); }

input{
    width:90%;
    padding:14px;
    font-size:20px;
    border-radius:14px;
    border:1px solid #ccc;
}

.player{
    padding:14px;
    margin:6px;
    border-radius:14px;
    border:none;
    font-size:16px;
    background:#eee;
}

.player.selected{
    background:#2ecc71;
    color:white;
}

.bar{
    height:10px;
    background:#ddd;
    border-radius:20px;
    overflow:hidden;
    margin:10px;
}

.fill{
    height:100%;
    width:0%;
    background:#2ecc71;
    transition:.3s;
}

#fb{
    font-size:20px;
    min-height:30px;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="app">

<!-- PLAYER -->
<div id="player" class="screen active">
    <div class="card">
        <h2>🎮 Choose Players</h2>

        <button class="player" id="a" onclick="pick('Amerie','a')">Amerie</button>
        <button class="player" id="p" onclick="pick('Patrice','p')">Patrice</button>
        <button class="player" id="f" onclick="pick('Phoebe','f')">Phoebe</button>

        <p id="status">Select players</p>

        <button class="option" onclick="start()" style="background:#2ecc71;color:white;">
            Start Adventure 🚀
        </button>
    </div>
</div>

<!-- GAME -->
<div id="game" class="screen">

    <div class="hud">
        <div id="turn"></div>
        <div>⭐ <span id="score">0</span></div>
    </div>

    <div class="bar"><div id="barFill" class="fill"></div></div>

    <div class="card" id="box"></div>

</div>

<!-- END -->
<div id="end" class="screen">
    <div class="card">
        <h2>🎉 Adventure Complete</h2>
        <div id="result"></div>
        <button class="option" onclick="location.reload()" style="background:#2ecc71;color:white;">
            Play Again
        </button>
    </div>
</div>

</div>

<script>

/* ---------------- STATE ---------------- */
let players=[];
let scores={};
let turn=0;
let q=0;
let current="";
let currentPlayer="";
let difficulty=1;

/* ---------------- SELECT ---------------- */
function pick(name,id){

    if(players.includes(name)){
        players=players.filter(x=>x!==name);
        document.getElementById(id).classList.remove("selected");
    } else {
        players.push(name);
        document.getElementById(id).classList.add("selected");
    }

    document.getElementById("status").innerText =
    players.length ? "Playing: "+players.join(", ") : "Select players";
}

/* ---------------- START ---------------- */
function start(){
    if(players.length===0) return;

    players.forEach(p=>scores[p]=0);

    document.getElementById("player").classList.remove("active");
    document.getElementById("game").classList.add("active");

    next();
}

/* ---------------- TURN ---------------- */
function nextPlayer(){
    currentPlayer = players[turn % players.length];
    turn++;
}

/* ---------------- GAME LOOP ---------------- */
function next(){

    if(q>=10){ end(); return; }

    q++;
    nextPlayer();

    document.getElementById("turn").innerText =
        "🎮 " + currentPlayer;

    document.getElementById("score").innerText = scores[currentPlayer];

    document.getElementById("barFill").style.width=(q*10)+"%";

    if(q%3===0) spelling();
    else if(q%3===1) math();
    else object();

    if(q%4===0 && difficulty<3) difficulty++; // progression
}

/* ---------------- SPELLING ENGINE ---------------- */
function spelling(){

    let words=[
        {w:"APPLE", img:"🍎"},
        {w:"BANANA", img:"🍌"},
        {w:"DOG", img:"🐶"},
        {w:"CAR", img:"🚗"},
        {w:"BOOK", img:"📘"}
    ];

    let item=words[Math.floor(Math.random()*words.length)];

    let pattern="";

    if(difficulty===1){
        pattern=item.w.split("").map((l,i)=>i%2===0?"_":l).join(" ");
    }
    else if(difficulty===2){
        pattern=item.w.split("").map(l=>"_").join(" ");
    }
    else{
        pattern="_ ".repeat(item.w.length);
    }

    current=item.w;

    render(`
        <div class="big">${item.img}</div>
        <h3>Spell the word</h3>
        <h2>${pattern}</h2>

        <input id="inp">

        <div class="option" onclick="checkSpell()">Check</div>

        <div id="fb"></div>
    `);
}

/* ---------------- MATH ENGINE ---------------- */
function math(){

    let a=Math.floor(Math.random()*10*difficulty);
    let b=Math.floor(Math.random()*10*difficulty);

    let ops=["+","-","*"][Math.floor(Math.random()*difficulty)];

    if(ops==="+") current=a+b;
    if(ops==="-") current=a-b;
    if(ops==="*") current=a*b;

    render(`
        <h3>Solve</h3>
        <h1>${a} ${ops} ${b}</h1>

        <input id="inp" type="number">

        <div class="option" onclick="checkMath()">Check</div>

        <div id="fb"></div>
    `);
}

/* ---------------- OBJECT ENGINE ---------------- */
function object(){

    let items=[
        {img:"🐶", ans:"DOG"},
        {img:"🍎", ans:"APPLE"},
        {img:"🚗", ans:"CAR"},
        {img:"🍌", ans:"BANANA"}
    ];

    let i=items[Math.floor(Math.random()*items.length)];
    current=i.ans;

    render(`
        <div class="big">${i.img}</div>
        <h3>What is this?</h3>

        <div class="option" onclick="check('DOG')">Dog</div>
        <div class="option" onclick="check('CAR')">Car</div>
        <div class="option" onclick="check('${i.ans}')">${i.ans}</div>

        <div id="fb"></div>
    `);
}

/* ---------------- RENDER ---------------- */
function render(html){
    document.getElementById("box").innerHTML=html;
}

/* ---------------- CHECK ---------------- */
function norm(v){return String(v||"").toUpperCase().trim();}

function checkSpell(){
    let v=norm(document.getElementById("inp").value);

    if(v===current) correct();
    else wrong();
}

function checkMath(){
    let v=Number(document.getElementById("inp").value);

    if(v===current) correct();
    else wrong();
}

function check(v){
    if(norm(v)===current) correct();
    else wrong();
}

/* ---------------- FEEDBACK ---------------- */
function correct(){
    scores[currentPlayer]+=10;
    document.getElementById("fb").innerHTML="🎉 Great!";
    setTimeout(next,600);
}

function wrong(){
    document.getElementById("fb").innerHTML="😊 Try again!";
}

/* ---------------- END ---------------- */
function end(){

    document.getElementById("game").classList.remove("active");
    document.getElementById("end").classList.add("active");

    let winner=Object.keys(scores).reduce((a,b)=>scores[a]>scores[b]?a:b);

    let html=`<h3>🏆 ${winner} wins!</h3>`;

    for(let p in scores){
        html+=`<p>${p}: ${scores[p]} ⭐</p>`;
    }

    document.getElementById("result").innerHTML=html;
}

</script>

</body>
</html>
